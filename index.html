<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Industrial Occult</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block}
        #canvas {
    background-image: 
        linear-gradient(to right, #111 1px, transparent 1px),
        linear-gradient(to bottom, #111 1px, transparent 1px);
    background-size: 40px 40px; /* Size of our grid tiles */
}

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            pointer-events: none;
        }

        #stats {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-left: 4px solid #0f0;
            margin-bottom: 10px;
            color: #fff;
            pointer-events: auto;
        }

        #menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: auto;
        }

        button {
            background: #111;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #222; color: #fff; border-color: #888; }
        button.active {
            background: #004466;
            border-color: #00ccff;
            color: #fff;
            box-shadow: 0 0 10px #00ccff;
        }

        .essence-text { color: #00f2ff; font-weight: bold; }
        .money-text { color: #00ff41; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats">
            BANK: <span class="money-text">$<span id="money">300</span></span><br>
            ESSENCE: <span class="essence-text" id="essence">0</span>/20
            <div id="ritual-status" style="color: #ff0055; font-size: 0.8em; margin-top: 5px; display: none;">
                🔴 RITUAL ACTIVE: MEGA DRILLS OVERCLOCKED
        </div>
    </div>

<div id="menu">
    <button id="btn-drill" onclick="setTool('drill')">⛏️ DRILL ($50)</button>
    <button id="btn-mega_drill" onclick="setTool('mega_drill')">🚜 MEGA DRILL ($800)</button>
    <button id="btn-refinery" onclick="setTool('refinery')">🌀 REFINERY ($300)</button>
    <button id="btn-purifier" onclick="setTool('purifier')">💎 PURIFIER ($500)</button>
    <button id="btn-altar" onclick="setTool('altar')">🕯️ ALTAR ($2000)</button>
    <button id="btn-maw" onclick="setTool('maw')">👄 THE MAW ($200)</button>
</div>
    </div>
    

    <canvas id="canvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
