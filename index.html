<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Occult Factory: Descent</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050508; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; gap: 20px;
        }

        .panel {
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #333; border-top: 3px solid #bc13fe;
            padding: 15px 20px; box-shadow: 0 4px 25px rgba(188, 19, 254, 0.2);
            pointer-events: auto; backdrop-filter: blur(8px); min-width: 200px;
        }

        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        .stat { font-size: 1.1rem; margin-bottom: 5px; }
        .money-text { color: #ffd700; font-weight: bold; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        .essence-text { color: #00f2ff; font-weight: bold; text-shadow: 0 0 5px rgba(0, 242, 255, 0.5); }
        .greed-text { color: #ff0055; font-size: 0.8rem; }

        button.blueprint-btn {
            display: block; width: 100%; background: #1a1a24; color: #aaa;
            border: 1px solid #444; border-left: 3px solid #555;
            padding: 10px 15px; margin-bottom: 8px; text-align: left; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit; font-size: 1rem;
        }

        button.blueprint-btn:hover { background: #252535; color: #fff; border-left-color: #bc13fe; box-shadow: 0 0 10px rgba(188, 19, 254, 0.3); }
        button.blueprint-btn.active {
            background: #2a1b38; border-color: #bc13fe; border-left: 5px solid #bc13fe; color: #fff;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2);
        }
        
        #notification {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.9); padding: 10px 20px; border-radius: 4px; 
            font-weight: bold; display: none; z-index: 20; box-shadow: 0 0 15px #ff0055;
        }

        #draft-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(12px);
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999;
        }

        .cards-container { display: flex; gap: 30px; padding: 20px; flex-wrap: wrap; justify-content: center; max-width: 900px;}
        .draft-card {
            background: #111; border: 2px solid #444; border-radius: 8px;
            width: 250px; padding: 20px; text-align: center; cursor: pointer;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .draft-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg); transition: 0.5s;
        }
        .draft-card:hover::before { left: 200%; }
        .draft-card:hover { transform: translateY(-10px); border-color: #bc13fe; box-shadow: 0 10px 20px rgba(188, 19, 254, 0.2); }
        .draft-card .type { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }

        #floor-transition {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; pointer-events: none; opacity: 0; transition: opacity 0.6s; z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="floor-transition"></div>

    <div id="ui">
        <div class="panel" id="stats">
            <h2>Lair <span id="wave">1</span></h2>
            <div class="stat">BANK: <span class="money-text">$<span id="money">500</span></span></div>
            <div class="stat">ESSENCE: <span class="essence-text"><span id="essence">0</span>/<span id="quota">50</span></span></div>
            <div class="stat greed-text">GREED MULT: x<span id="greed-mult">1.0</span></div>
        </div>

        <div class="panel" id="menu">
            <h2>Blueprints</h2>
            <div id="blueprint-list">
                <button id="btn-drill" class="blueprint-btn" onclick="setTool('drill')">⛏️ DRILL ($50)</button>
                <button id="btn-purifier" class="blueprint-btn" onclick="setTool('purifier')">🔮 PURIFIER ($150)</button>
            </div>
        </div>
    </div>

    <div id="draft-overlay">
        <h1 id="draft-title" style="text-shadow: 0 0 15px #bc13fe;">TITHE MET.</h1>
        <p id="greed-info" style="color: #ffd700; margin-bottom: 20px;"></p>
        <div class="cards-container" id="draft-cards"></div>
    </div>

    <div id="notification">CAN ONLY PLACE ON LEYLINES!</div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 35; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- CONSTANTS ---
        const STARTING_CASH = 500;
        const BASE_SELL_VALUE = 15;

        // --- GAME STATE ---
        let runStats = {
            wispSpeed: 3.5,
            wispAgility: 0.08, 
            wispCapacity: 1,
            drillSpeed: 90,
            greedMult: 1.0 
        };

        let state = {
            money: STARTING_CASH,
            essence: 0,
            quota: 50,
            wave: 1,
            selectedTool: null,
            map: new Map(), 
            buildings: [],
            workers: [],
            paused: false,
            unlockedBlueprints: ['drill', 'purifier'],
            globalTime: 0 // Used for visual pulsing effects
        };

        // NEW: Expanded catalog with advanced buildings
        const CATALOG = {
            drill: { cost: 50, type: 'drill', name: '⛏️ DRILL' },
            purifier: { cost: 150, type: 'purifier', name: '🔮 PURIFIER' },
            splitter: { cost: 300, type: 'splitter', name: '➗ SPLITTER' },
            accelerator: { cost: 200, type: 'accelerator', name: '⏩ ACCELERATOR' },
            siphon: { cost: 400, type: 'siphon', name: '🩸 SIPHON' }, // Makes Blood Wisps
            altar: { cost: 750, type: 'altar', name: '👁️ ALTAR' }     // Combines Blood + Void
        };

        // NEW: Expanded Relic and Blueprint pool
        const DRAFT_POOL = [
            { id: 'relic_drill', type: 'Relic', name: 'OVERCLOCKED GEARS', desc: 'Drills spawn Wisps 25% faster.' },
            { id: 'relic_agility', type: 'Relic', name: 'SLIPPERY SOULS', desc: 'Wisps curve around rocks 50% faster.' },
            { id: 'relic_speed', type: 'Relic', name: 'TAILWIND', desc: 'Base Wisp speed increased by 30%.' },
            { id: 'relic_abyss', type: 'Relic', name: 'ABYSSAL HUNGER', desc: 'The Maw grants +50% payout from all Wisps.' },
            { id: 'build_splitter', type: 'Blueprint', name: 'WISP SPLITTER', desc: 'Duplicates any Wisp passing through it.', cost: 300, blueprintId: 'splitter' },
            { id: 'build_accelerator', type: 'Blueprint', name: 'VOID ACCELERATOR', desc: 'Permanently doubles Wisp speed.', cost: 200, blueprintId: 'accelerator' },
            { id: 'build_siphon', type: 'Blueprint', name: 'BLOOD SIPHON', desc: 'Extracts volatile Blood Wisps (High Cash Value).', cost: 400, blueprintId: 'siphon' },
            { id: 'build_altar', type: 'Blueprint', name: 'FUSION ALTAR', desc: 'Combines 1 Void + 1 Blood Wisp into an Abyssal Wisp.', cost: 750, blueprintId: 'altar' }
        ];

        let ownedRelics = [];

        function initMap() {
            state.map.clear();
            const cols = Math.floor(canvas.width / TILE_SIZE);
            const rows = Math.floor(canvas.height / TILE_SIZE);

            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    const r = Math.random();
                    let isLeyline = r < 0.12;
                    let isObstacle = !isLeyline && r < 0.22;
                    state.map.set(`${x},${y}`, { 
                        gridX: x, gridY: y, 
                        isLeyline: isLeyline, isObstacle: isObstacle, occupied: isObstacle 
                    });
                }
            }

            const centerX = Math.floor(cols / 2);
            const centerY = Math.floor(rows / 2);
            for(let dx = -1; dx <= 1; dx++) {
                for(let dy = -1; dy <= 1; dy++) {
                    let tile = state.map.get(`${centerX+dx},${centerY+dy}`);
                    if(tile) { tile.isObstacle = false; tile.isLeyline = false; tile.occupied = false; }
                }
            }

            state.map.get(`${centerX},${centerY}`).occupied = true;
            state.buildings.push({
                type: 'maw', x: centerX * TILE_SIZE, y: centerY * TILE_SIZE,
                cx: (centerX * TILE_SIZE) + (TILE_SIZE / 2), cy: (centerY * TILE_SIZE) + (TILE_SIZE / 2)
            });
        }

        window.setTool = (t) => {
            state.selectedTool = t;
            document.querySelectorAll('.blueprint-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${t}`)) document.getElementById(`btn-${t}`).classList.add('active');
        };

        function updateUIStats() {
            document.getElementById('money').innerText = Math.floor(state.money);
            document.getElementById('essence').innerText = Math.floor(state.essence);
            document.getElementById('quota').innerText = state.quota;
            document.getElementById('wave').innerText = state.wave;
            document.getElementById('greed-mult').innerText = runStats.greedMult.toFixed(2);
        }

        canvas.addEventListener('mousedown', (e) => {
            if (state.paused || !state.selectedTool) return;
            const gridX = Math.floor(e.clientX / TILE_SIZE);
            const gridY = Math.floor(e.clientY / TILE_SIZE);
            const tile = state.map.get(`${gridX},${gridY}`);

            if (!tile || tile.occupied) return;
            if ((state.selectedTool === 'drill' || state.selectedTool === 'siphon') && !tile.isLeyline) {
                showNotification("EXTRACTORS REQUIRE LEYLINES!"); return;
            }

            const cost = CATALOG[state.selectedTool].cost;
            if (state.money >= cost) {
                state.money -= cost;
                tile.occupied = true;
                
                // Initialize building with custom properties if needed (like inventory for Altar)
                let newBuilding = {
                    type: state.selectedTool, timer: 0,
                    x: gridX * TILE_SIZE, y: gridY * TILE_SIZE,
                    cx: (gridX * TILE_SIZE) + (TILE_SIZE / 2), cy: (gridY * TILE_SIZE) + (TILE_SIZE / 2),
                    inventory: { void: 0, blood: 0 } // Used by Altar
                };
                
                state.buildings.push(newBuilding);
                updateUIStats();
            } else {
                showNotification("NOT ENOUGH FUNDS!");
            }
        });

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.innerText = msg; notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 2000);
        }

        function triggerDraft() {
            state.paused = true;
            let profit = Math.max(0, state.money - STARTING_CASH);
            let greedGain = (profit / 100) * 0.05;
            runStats.greedMult += greedGain;

            document.getElementById('greed-info').innerText = profit > 0 ? 
                `Greed Reward: $${Math.floor(profit)} profit = +${greedGain.toFixed(2)} Multiplier!` : 
                "No profit this floor. No Greed bonus.";

            document.getElementById('draft-overlay').style.display = 'flex';
            let availablePool = DRAFT_POOL.filter(item => !ownedRelics.includes(item.id) && !state.unlockedBlueprints.includes(item.blueprintId));
            availablePool.sort(() => 0.5 - Math.random());
            let choices = availablePool.slice(0, 3);

            const container = document.getElementById('draft-cards');
            container.innerHTML = '';
            choices.forEach(choice => {
                const card = document.createElement('div');
                card.className = 'draft-card';
                card.innerHTML = `<div class="type">${choice.type}</div><h3>${choice.name}</h3><p>${choice.desc}</p>`;
                card.onclick = () => selectDraft(choice);
                container.appendChild(card);
            });
        }

        function selectDraft(choice) {
            if (choice.type === 'Relic') {
                ownedRelics.push(choice.id);
                if (choice.id === 'relic_drill') runStats.drillSpeed *= 0.75; 
                if (choice.id === 'relic_agility') runStats.wispAgility *= 1.5;
                if (choice.id === 'relic_speed') runStats.wispSpeed *= 1.3;
            } else {
                state.unlockedBlueprints.push(choice.blueprintId);
                const btn = document.createElement('button');
                btn.id = `btn-${choice.blueprintId}`;
                btn.className = 'blueprint-btn';
                btn.innerText = `${CATALOG[choice.blueprintId].name} ($${choice.cost})`;
                btn.onclick = () => setTool(choice.blueprintId);
                document.getElementById('blueprint-list').appendChild(btn);
            }
            nextFloor();
        }

        function nextFloor() {
            const trans = document.getElementById('floor-transition');
            trans.style.opacity = '1';
            
            setTimeout(() => {
                state.wave++;
                state.money = STARTING_CASH;
                state.essence = 0;
                state.quota += 50 + (state.wave * 15); // Scaling difficulty
                state.buildings = [];
                state.workers = [];
                initMap();
                updateUIStats();
                document.getElementById('draft-overlay').style.display = 'none';
                state.paused = false;
                trans.style.opacity = '0';
            }, 600);
        }

        function update() {
            if (state.paused) return;
            state.globalTime += 0.05;
            
            const targetMaw = state.buildings.find(b => b.type === 'maw');
            const interactables = state.buildings.filter(b => b.type !== 'maw' && b.type !== 'drill' && b.type !== 'siphon');

            // Generator Logic
            state.buildings.forEach(b => {
                if (b.type === 'drill') {
                    b.timer++;
                    if (b.timer >= runStats.drillSpeed) {
                        b.timer = 0;
                        state.workers.push({
                            x: b.cx, y: b.cy, vx: (Math.random()-0.5), vy: (Math.random()-0.5),
                            trail: [], type: 'gold', hasSplit: false, speedMult: 1 
                        });
                    }
                }
                // NEW: Siphon creates Blood wisps slowly
                if (b.type === 'siphon') {
                    b.timer++;
                    if (b.timer >= runStats.drillSpeed * 1.5) { 
                        b.timer = 0;
                        state.workers.push({
                            x: b.cx, y: b.cy, vx: (Math.random()-0.5), vy: (Math.random()-0.5),
                            trail: [], type: 'blood', hasSplit: false, speedMult: 0.9 
                        });
                    }
                }
            });

            let newWorkers = [];
            
            // Wisp Logic & Pathing
            for (let i = state.workers.length - 1; i >= 0; i--) {
                let w = state.workers[i];
                let currentTarget = targetMaw;

                // NEW: Intelligent Targeting System based on Wisp Type
                let validInteractables = interactables.filter(b => {
                    if (w.type === 'gold' && b.type === 'purifier') return true;
                    if ((w.type === 'void' || w.type === 'blood') && b.type === 'altar') return true;
                    if (b.type === 'splitter' && !w.hasSplit) return true;
                    if (b.type === 'accelerator' && w.speedMult === 1) return true;
                    return false;
                });

                if (validInteractables.length > 0) {
                    let nearestInt = validInteractables[0];
                    let dInt = Math.hypot(nearestInt.cx - w.x, nearestInt.cy - w.y);
                    for(let j=1; j<validInteractables.length; j++){
                        let d = Math.hypot(validInteractables[j].cx - w.x, validInteractables[j].cy - w.y);
                        if(d < dInt) { dInt = d; nearestInt = validInteractables[j]; }
                    }
                    let dMaw = Math.hypot(targetMaw.cx - w.x, targetMaw.cy - w.y);
                    if (dInt < dMaw) currentTarget = nearestInt;
                }

                let dx = currentTarget.cx - w.x; 
                let dy = currentTarget.cy - w.y; 
                let dist = Math.hypot(dx, dy);

                // Collision / Processing
                if (dist < 15) {
                    if (currentTarget.type === 'maw') {
                        let baseMult = ownedRelics.includes('relic_abyss') ? 1.5 : 1;
                        let finalMoney = 0;
                        let finalEssence = 0;

                        if (w.type === 'gold') finalMoney = (BASE_SELL_VALUE * runStats.greedMult * baseMult);
                        else if (w.type === 'void') finalEssence = (runStats.wispCapacity * baseMult);
                        else if (w.type === 'blood') finalMoney = (BASE_SELL_VALUE * 2.5 * runStats.greedMult * baseMult);
                        else if (w.type === 'abyssal') {
                            finalEssence = (runStats.wispCapacity * 4 * baseMult);
                            finalMoney = (BASE_SELL_VALUE * 4 * runStats.greedMult * baseMult);
                        }

                        state.money += finalMoney;
                        state.essence += finalEssence;
                        
                        if (state.essence >= state.quota && !state.paused) triggerDraft();
                        state.workers.splice(i, 1); updateUIStats(); continue;
                    } 
                    else if (currentTarget.type === 'purifier') {
                        w.type = 'void';
                    } 
                    else if (currentTarget.type === 'splitter' && !w.hasSplit) {
                        w.hasSplit = true; w.vx *= -1;
                        newWorkers.push({...w, trail: [], vx: -w.vx, vy: -w.vy});
                    }
                    else if (currentTarget.type === 'accelerator') {
                        w.speedMult = 2;
                    }
                    // NEW: Combiner logic
                    else if (currentTarget.type === 'altar') {
                        currentTarget.inventory[w.type]++;
                        state.workers.splice(i, 1); // consume the wisp
                        
                        // Check if we have ingredients for a fusion
                        if (currentTarget.inventory.void >= 1 && currentTarget.inventory.blood >= 1) {
                            currentTarget.inventory.void--;
                            currentTarget.inventory.blood--;
                            newWorkers.push({
                                x: currentTarget.cx, y: currentTarget.cy, 
                                vx: (Math.random()-0.5), vy: (Math.random()-0.5),
                                trail: [], type: 'abyssal', hasSplit: false, speedMult: 1.2
                            });
                        }
                        continue; // Skip movement calc since it was absorbed
                    }
                }

                // Movement
                let speed = runStats.wispSpeed * w.speedMult;
                let dvx = (dx/dist) * speed; let dvy = (dy/dist) * speed;
                
                // Obstacle avoidance
                let lx = w.x + dvx*6; let ly = w.y + dvy*6;
                let tile = state.map.get(`${Math.floor(lx/TILE_SIZE)},${Math.floor(ly/TILE_SIZE)}`);
                if (tile && tile.isObstacle) { let t = dvx; dvx = -dvy; dvy = t; }

                w.vx += (dvx - w.vx) * runStats.wispAgility;
                w.vy += (dvy - w.vy) * runStats.wispAgility;
                w.x += w.vx; w.y += w.vy;
                w.trail.push({x: w.x, y: w.y});
                if (w.trail.length > 8) w.trail.shift();
            }
            state.workers.push(...newWorkers);
        }

        // --- GRAPHICS UPGRADES ---
        function draw() {
            update();
            
            // Clear screen
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#050508'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Faint Grid for immersion
            ctx.strokeStyle = '#ffffff05';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=TILE_SIZE) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=TILE_SIZE) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Turn on additive blending for "Neon/Bloom" magic effects
            ctx.globalCompositeOperation = 'lighter';

            state.map.forEach(tile => {
                if (tile.isLeyline) {
                    let pulse = Math.sin(state.globalTime + tile.gridX) * 0.15 + 0.2; // Pulsing effect
                    ctx.fillStyle = `rgba(188, 19, 254, ${pulse})`;
                    ctx.beginPath(); ctx.arc(tile.gridX*TILE_SIZE+TILE_SIZE/2, tile.gridY*TILE_SIZE+TILE_SIZE/2, 10, 0, Math.PI*2); ctx.fill();
                }
                if (tile.isObstacle) {
                    ctx.globalCompositeOperation = 'source-over'; // Draw solid rocks normally
                    ctx.fillStyle = '#111116';
                    ctx.strokeStyle = '#22222d';
                    ctx.fillRect(tile.gridX*TILE_SIZE+2, tile.gridY*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
                    ctx.strokeRect(tile.gridX*TILE_SIZE+2, tile.gridY*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
                    ctx.globalCompositeOperation = 'lighter';
                }
            });

            state.buildings.forEach(b => {
                ctx.shadowBlur = 15;
                if (b.type === 'drill') { ctx.fillStyle = '#00f2ff'; ctx.shadowColor = '#00f2ff'; }
                else if (b.type === 'siphon') { ctx.fillStyle = '#ff003c'; ctx.shadowColor = '#ff003c'; }
                else if (b.type === 'purifier') { ctx.fillStyle = '#bc13fe'; ctx.shadowColor = '#bc13fe'; }
                else if (b.type === 'maw') { ctx.fillStyle = '#ff0055'; ctx.shadowBlur = 25; ctx.shadowColor = '#ff0055'; }
                else if (b.type === 'splitter') { ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; }
                else if (b.type === 'accelerator') { ctx.fillStyle = '#00ff41'; ctx.shadowColor = '#00ff41'; }
                else if (b.type === 'altar') { ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 20; ctx.shadowColor = '#bc13fe'; }
                
                ctx.beginPath();
                ctx.arc(b.cx, b.cy, b.type==='maw' || b.type==='altar' ? 14 : 10, 0, Math.PI*2);
                ctx.fill();

                // Draw Altar Inventory indicators
                if (b.type === 'altar') {
                    ctx.shadowBlur = 0;
                    if(b.inventory.void > 0) { ctx.fillStyle='#bc13fe'; ctx.beginPath(); ctx.arc(b.cx - 6, b.cy - 6, 3, 0, Math.PI*2); ctx.fill(); }
                    if(b.inventory.blood > 0) { ctx.fillStyle='#ff003c'; ctx.beginPath(); ctx.arc(b.cx + 6, b.cy - 6, 3, 0, Math.PI*2); ctx.fill(); }
                }
            });

            state.workers.forEach(w => {
                // Color assignments for new Wisps
                let color = '#ffd700'; let shadowColor = '#ffd700';
                if (w.type === 'void') { color = '#bc13fe'; shadowColor = '#bc13fe'; }
                if (w.type === 'blood') { color = '#ff003c'; shadowColor = '#ff003c'; }
                if (w.type === 'abyssal') { color = '#ffffff'; shadowColor = '#00f2ff'; } // High contrast

                ctx.shadowBlur = 10;
                ctx.shadowColor = shadowColor;
                ctx.strokeStyle = color + '66'; // Add transparency to trail hex
                ctx.lineWidth = w.type === 'abyssal' ? 3 : 2;

                if (w.trail.length > 1) {
                    ctx.beginPath(); ctx.moveTo(w.trail[0].x, w.trail[0].y);
                    w.trail.forEach(pt => ctx.lineTo(pt.x, pt.y)); ctx.stroke();
                }
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(w.x, w.y, w.type === 'abyssal' ? 4 : 2.5, 0, Math.PI*2); ctx.fill();
            });

            ctx.shadowBlur = 0; // Reset for next frame
            requestAnimationFrame(draw);
        }

        initMap();
        draw();
    </script>
</body>
</html>
