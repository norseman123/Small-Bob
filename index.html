<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DracoFactory: The Endless Hoard</title>
    <style>
        body { background: #111; color: #ffd700; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 800px; }
        .active { display: flex; }
        
        /* Grid & Game */
        #game-board { display: grid; grid-template-columns: repeat(8, 50px); gap: 2px; background: #222; padding: 10px; border: 4px solid #8b0000; margin: 20px 0; }
        .cell { width: 50px; height: 50px; background: #333; border: 1px solid #444; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .cell:hover { background: #555; }
        .hp-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: red; width: 100%; }
        
        /* UI Elements */
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { background: #8b0000; color: #fff; border: 2px solid #5a0000; padding: 10px 15px; cursor: pointer; font-weight: bold; font-family: inherit; }
        button:hover { background: #ff4500; }
        button:disabled { background: #555; cursor: not-allowed; border-color: #333; }
        .panel { background: #222; border: 2px solid #444; padding: 15px; margin: 10px; width: 100%; }
        
        /* Drafting */
        .draft-container { display: flex; gap: 20px; }
        .draft-card { background: #333; border: 2px solid #ffd700; padding: 20px; cursor: pointer; width: 200px; }
        .draft-card:hover { background: #444; transform: scale(1.05); }

        #alert-box { color: #ff4500; font-weight: bold; min-height: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="screen-menu" class="screen active">
        <h1>DRAGON'S GREED</h1>
        <p>Choose your lineage to begin.</p>
        <div class="draft-container">
            <div class="draft-card" onclick="startGame('gilded')">
                <h3>Gilded Wyrm</h3>
                <p>Start with 200 Gold. Hoarders generate +1 extra base gold.</p>
            </div>
            <div class="draft-card" onclick="startGame('crimson')">
                <h3>Crimson Drake</h3>
                <p>Start with a free Roaster. Buildings have +50 HP.</p>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="panel">
            <h2>Level <span id="level-display">1</span> | Target: <span id="target-display">500</span>g</h2>
            <p>Gold: <span id="gold-display">0</span> | Threat: <span id="threat-display">Low</span></p>
            <div id="alert-box"></div>
        </div>

        <div id="game-board"></div>

        <div class="controls panel">
            <button onclick="selectTool('hoarder', 30)">Hoarder (30g) - Produces Gold</button>
            <button onclick="selectTool('vault', 100)">Vault (100g) - Boosts adjacent Hoarders</button>
            <button onclick="selectTool('roaster', 75)">Roaster (75g) - Kills Enemies</button>
        </div>

        <div class="controls panel">
            <button id="btn-ascend" onclick="ascend()" disabled>Ascend to Next Level</button>
            <button id="btn-greed" onclick="activateGreed()" disabled>GREED (Stay for x2 Multiplier, Harder Enemies)</button>
        </div>
    </div>

    <div id="screen-draft" class="screen">
        <h2>VICTORY! Choose a Relic.</h2>
        <div class="draft-container" id="draft-choices"></div>
    </div>

    <script>
        // --- GAME STATE ---
        let state = {
            gold: 0, level: 1, target: 500, class: null, greedMultiplier: 1,
            buildingHP: 100, hoarderBase: 2, currentTool: { id: null, cost: 0 },
            relics: [], loop: null, enemySpawnRate: 0.05
        };
        const gridSize = 8;
        let grid = [];

        // --- INITIALIZATION ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startGame(dragonClass) {
            state.class = dragonClass;
            state.gold = dragonClass === 'gilded' ? 200 : 100;
            if (dragonClass === 'gilded') state.hoarderBase += 1;
            if (dragonClass === 'crimson') state.buildingHP += 50;
            
            initGrid();
            switchScreen('screen-game');
            state.loop = setInterval(gameTick, 1000);
            updateUI();
        }

        function initGrid() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            grid = [];
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x; cell.dataset.y = y;
                    cell.onclick = () => placeBuilding(x, y);
                    board.appendChild(cell);
                    grid.push({ x, y, type: 'empty', hp: 0, maxHp: 0, element: cell });
                }
            }
        }

        // --- BUILDING & ECONOMY ---
        function selectTool(id, cost) {
            state.currentTool = { id, cost };
            document.getElementById('alert-box').innerText = `Selected: ${id}`;
        }

        function placeBuilding(x, y) {
            const cellData = grid.find(c => c.x === x && c.y === y);
            if (cellData.type !== 'empty' || state.gold < state.currentTool.cost || !state.currentTool.id) return;

            state.gold -= state.currentTool.cost;
            cellData.type = state.currentTool.id;
            cellData.hp = state.buildingHP;
            cellData.maxHp = state.buildingHP;
            
            renderGrid();
            updateUI();
        }

        function getAdjacencyBonus(x, y) {
            let bonus = 0;
            const neighbors = [
                grid.find(c => c.x === x+1 && c.y === y), grid.find(c => c.x === x-1 && c.y === y),
                grid.find(c => c.x === x && c.y === y+1), grid.find(c => c.x === x && c.y === y-1)
            ];
            neighbors.forEach(n => { if (n && n.type === 'vault') bonus += 2; });
            return bonus;
        }

        // --- GAME LOOP & COMBAT ---
        function gameTick() {
            let income = 0;
            let roasterDamage = 10 * (state.relics.includes('dragon_breath') ? 2 : 1);

            // Economy & Attack Phase
            grid.forEach(cell => {
                if (cell.type === 'hoarder') {
                    income += (state.hoarderBase + getAdjacencyBonus(cell.x, cell.y)) * state.greedMultiplier;
                }
                // Roasters heal adjacent buildings or damage enemies (simplified here to just healing for prototype)
                if (cell.type === 'roaster') {
                    grid.filter(c => c.type === 'enemy').forEach(e => e.hp -= roasterDamage);
                }
            });

            state.gold += income;

            // Enemy Spawn Phase
            if (Math.random() < state.enemySpawnRate * state.greedMultiplier) {
                let emptyCells = grid.filter(c => c.type === 'empty');
                if (emptyCells.length > 0) {
                    let spawn = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    spawn.type = 'enemy';
                    spawn.hp = 50 * state.level;
                    document.getElementById('alert-box').innerText = "Knights have breached the hoard!";
                }
            }

            // Enemy Attack Phase
            grid.filter(c => c.type === 'enemy').forEach(enemy => {
                if (enemy.hp <= 0) {
                    enemy.type = 'empty'; // Enemy dies
                    state.gold += 10;
                } else {
                    // Find random building to attack
                    let buildings = grid.filter(c => c.type !== 'empty' && c.type !== 'enemy');
                    if (buildings.length > 0) {
                        let target = buildings[Math.floor(Math.random() * buildings.length)];
                        target.hp -= 10 * state.level;
                        if (target.hp <= 0) target.type = 'empty';
                    }
                }
            });

            checkLevelProgression();
            renderGrid();
            updateUI();
        }

        // --- PROGRESSION & GREED ---
        function checkLevelProgression() {
            const btnAscend = document.getElementById('btn-ascend');
            const btnGreed = document.getElementById('btn-greed');
            
            if (state.gold >= state.target) {
                btnAscend.disabled = false;
                btnGreed.disabled = state.greedMultiplier > 1; // Can only greed once per level
            } else {
                btnAscend.disabled = true;
                btnGreed.disabled = true;
            }
        }

        function activateGreed() {
            state.greedMultiplier += 1;
            state.target *= 2;
            state.enemySpawnRate += 0.1; // Harder enemies
            document.getElementById('alert-box').innerText = "GREED ACTIVATED. Survive if you can.";
            updateUI();
        }

        function ascend() {
            clearInterval(state.loop);
            state.level++;
            state.target = Math.floor(state.target * 1.5);
            state.greedMultiplier = 1;
            state.enemySpawnRate += 0.02;
            generateDraft();
            switchScreen('screen-draft');
        }

        // --- DRAFTING ---
        function generateDraft() {
            const choices = [
                { id: 'dragon_breath', name: "Dragon's Breath", desc: "Roasters deal double damage." },
                { id: 'midas_touch', name: "Midas Scales", desc: "+2 Base Gold from all Hoarders." },
                { id: 'sturdy_stone', name: "Dwarven Masonry", desc: "Instantly heal and grant +100 Max HP to all buildings." }
            ];
            const container = document.getElementById('draft-choices');
            container.innerHTML = '';
            
            choices.forEach(relic => {
                const card = document.createElement('div');
                card.className = 'draft-card';
                card.innerHTML = `<h3>${relic.name}</h3><p>${relic.desc}</p>`;
                card.onclick = () => selectRelic(relic);
                container.appendChild(card);
            });
        }

        function selectRelic(relic) {
            state.relics.push(relic.id);
            if (relic.id === 'midas_touch') state.hoarderBase += 2;
            if (relic.id === 'sturdy_stone') state.buildingHP += 100;
            
            initGrid(); // Reset board for next level
            switchScreen('screen-game');
            state.loop = setInterval(gameTick, 1000);
        }

        // --- RENDER HELPERS ---
        function renderGrid() {
            const icons = { 'empty': '', 'hoarder': '🦎', 'vault': '💰', 'roaster': '🔥', 'enemy': '⚔️' };
            grid.forEach(cell => {
                cell.element.innerText = icons[cell.type];
                if (cell.type !== 'empty') {
                    let pct = Math.max(0, (cell.hp / (cell.maxHp || 50)) * 100);
                    cell.element.innerHTML += `<div class="hp-bar" style="width: ${pct}%"></div>`;
                }
            });
        }

        function updateUI() {
            document.getElementById('gold-display').innerText = Math.floor(state.gold);
            document.getElementById('level-display').innerText = state.level;
            document.getElementById('target-display').innerText = state.target;
            document.getElementById('threat-display').innerText = state.enemySpawnRate > 0.1 ? "HIGH" : "Low";
        }
    </script>
</body>
</html>
