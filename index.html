<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Occult Factory: Descent</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050508; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; gap: 20px;
        }

        .panel {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #2a2a35; border-left: 4px solid #bc13fe;
            padding: 15px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            pointer-events: auto; backdrop-filter: blur(10px); min-width: 220px;
        }

        h2 { margin: 0 0 10px 0; font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 3px;}
        .stat { font-size: 1.2rem; margin-bottom: 5px; font-weight: bold; }
        .money-text { color: #ffd700; }
        .essence-text { color: #00f2ff; }

        .blueprint-btn {
            display: block; width: 100%; background: #151520; color: #777;
            border: 1px solid #333; padding: 12px; margin-bottom: 8px; 
            text-align: left; cursor: pointer; transition: 0.2s; font-family: inherit;
        }

        .blueprint-btn:hover { background: #1c1c2b; color: #fff; border-color: #bc13fe; }
        .blueprint-btn.active {
            background: #231635; border-color: #bc13fe; color: #fff;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.3);
        }
        
        #draft-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
        }

        .draft-card {
            background: #0f0f15; border: 1px solid #333; padding: 30px;
            text-align: center; cursor: pointer; transition: 0.3s; width: 200px;
        }
        .draft-card:hover { border-color: #bc13fe; transform: translateY(-5px); }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h2>Floor <span id="wave">1</span></h2>
            <div class="stat"><span class="money-text">$<span id="money">500</span></span></div>
            <div class="stat"><span class="essence-text">✧ <span id="essence">0</span>/<span id="quota">50</span></span></div>
        </div>

        <div class="panel">
            <h2>Blueprints</h2>
            <div id="blueprint-list">
                <button id="btn-drill" class="blueprint-btn" onclick="setTool('drill')">⛏ DRILL ($50)</button>
                <button id="btn-purifier" class="blueprint-btn" onclick="setTool('purifier')">🔮 PURIFIER ($150)</button>
                <button id="btn-reaper" class="blueprint-btn" onclick="setTool('reaper')">💀 REAPER ($300)</button>
            </div>
        </div>
    </div>

    <div id="draft-overlay">
        <h1 style="letter-spacing: 15px; color: #bc13fe;">ASCENSION</h1>
        <div style="display:flex; gap:20px" id="draft-cards"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 40;

        let state = {
            money: 500, essence: 0, quota: 50, wave: 1,
            selectedTool: null, buildings: [], workers: [],
            map: new Map(), paused: false
        };

        const CATALOG = {
            drill: { cost: 50, color: '#00f2ff', aura: 'rgba(0, 242, 255, 0.1)' },
            purifier: { cost: 150, color: '#bc13fe', aura: 'rgba(188, 19, 254, 0.1)' },
            reaper: { cost: 300, color: '#ff0044', aura: 'rgba(255, 0, 68, 0.1)' }
        };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            state.map.clear();
            const cols = Math.floor(canvas.width / TILE_SIZE);
            const rows = Math.floor(canvas.height / TILE_SIZE);

            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    let r = Math.random();
                    let isLey = r < 0.1;
                    let isObs = !isLey && r < 0.2;
                    state.map.set(`${x},${y}`, { isLey, isObs, occupied: isObs });
                }
            }
            const cx = Math.floor(cols/2), cy = Math.floor(rows/2);
            state.buildings.push({ type: 'maw', cx: cx*TILE_SIZE+20, cy: cy*TILE_SIZE+20 });
        }

        window.setTool = (t) => {
            state.selectedTool = t;
            document.querySelectorAll('.blueprint-btn').forEach(b => b.classList.remove('active'));
            if(t) document.getElementById(`btn-${t}`).classList.add('active');
        };

        canvas.addEventListener('mousedown', (e) => {
            const gx = Math.floor(e.clientX / TILE_SIZE);
            const gy = Math.floor(e.clientY / TILE_SIZE);
            const tile = state.map.get(`${gx},${gy}`);

            if (tile && !tile.occupied && state.selectedTool) {
                const cost = CATALOG[state.selectedTool].cost;
                if (state.money >= cost) {
                    if (state.selectedTool === 'drill' && !tile.isLey) return;
                    state.money -= cost;
                    state.buildings.push({
                        type: state.selectedTool,
                        cx: gx * TILE_SIZE + 20, cy: gy * TILE_SIZE + 20,
                        timer: 0
                    });
                    tile.occupied = true;
                    updateUI();
                }
            }
        });

        function update() {
            if (state.paused) return;

            // Spawn Logic
            state.buildings.forEach(b => {
                if (b.type === 'drill') {
                    b.timer++;
                    if (b.timer > 90) {
                        state.workers.push({
                            x: b.cx, y: b.cy, vx: Math.random()-0.5, vy: Math.random()-0.5,
                            type: 'gold', trail: []
                        });
                        b.timer = 0;
                    }
                }
            });

            const maw = state.buildings.find(b => b.type === 'maw');
            const interactables = state.buildings.filter(b => b.type !== 'maw' && b.type !== 'drill');

            state.workers.forEach((w, i) => {
                let target = maw;
                
                // Synergy: Gold wisps look for Purifiers, Purified wisps look for Reapers
                if (w.type === 'gold') {
                    let p = interactables.find(b => b.type === 'purifier');
                    if (p) target = p;
                } else if (w.type === 'void') {
                    let r = interactables.find(b => b.type === 'reaper');
                    if (r) target = r;
                }

                const dx = target.cx - w.x, dy = target.cy - w.y;
                const dist = Math.hypot(dx, dy);

                // COLLISION FIX: If too close to center, force a "touch" then move on
                if (dist < 15) {
                    if (target.type === 'maw') {
                        state.money += w.type === 'soul' ? 100 : (w.type === 'void' ? 40 : 15);
                        state.essence += w.type === 'soul' ? 10 : (w.type === 'void' ? 3 : 1);
                        state.workers.splice(i, 1);
                        if (state.essence >= state.quota) triggerDraft();
                        updateUI();
                        return;
                    }
                    if (target.type === 'purifier') w.type = 'void';
                    if (target.type === 'reaper' && w.type === 'void') w.type = 'soul';
                }

                // Physics
                let acc = 0.08;
                let speed = w.type === 'soul' ? 5 : 3.5;
                w.vx += (dx/dist * speed - w.vx) * acc;
                w.vy += (dy/dist * speed - w.vy) * acc;

                // Wall Avoidance
                let nextX = w.x + w.vx * 5, nextY = w.y + w.vy * 5;
                let tile = state.map.get(`${Math.floor(nextX/TILE_SIZE)},${Math.floor(nextY/TILE_SIZE)}`);
                if (tile && tile.isObs) {
                    let temp = w.vx; w.vx = -w.vy; w.vy = temp; // Slingshot around
                }

                w.x += w.vx; w.y += w.vy;
                
                // Ghost Trail
                w.trail.push({x: w.x, y: w.y});
                if (w.trail.length > 8) w.trail.shift();
            });
        }

        function draw() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Leylines (Soft Pulse)
            const pulse = Math.sin(Date.now() / 500) * 5;
            state.map.forEach((tile, key) => {
                if (tile.isLey) {
                    const [x, y] = key.split(',').map(Number);
                    ctx.fillStyle = '#bc13fe11';
                    ctx.beginPath();
                    ctx.arc(x*TILE_SIZE+20, y*TILE_SIZE+20, 10 + pulse, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            // Buildings (Geometric Occult Style)
            state.buildings.forEach(b => {
                let col = b.type === 'maw' ? '#ff0044' : CATALOG[b.type].color;
                
                // Outer Ring
                ctx.strokeStyle = col;
                ctx.lineWidth = 2;
                ctx.strokeRect(b.cx-15, b.cy-15, 30, 30);
                
                // Inner Core
                ctx.fillStyle = col;
                ctx.shadowBlur = 15; ctx.shadowColor = col;
                ctx.beginPath();
                ctx.arc(b.cx, b.cy, b.type === 'maw' ? 8 : 5, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Aura
                if (b.type !== 'maw') {
                    ctx.fillStyle = CATALOG[b.type].aura;
                    ctx.beginPath(); ctx.arc(b.cx, b.cy, 40, 0, Math.PI*2); ctx.fill();
                }
            });

            // Wisps (Ghostly trails)
            state.workers.forEach(w => {
                let col = w.type === 'gold' ? '#ffd700' : (w.type === 'void' ? '#bc13fe' : '#00f2ff');
                
                // Draw Trail
                ctx.beginPath();
                w.trail.forEach((p, index) => {
                    ctx.globalAlpha = index / w.trail.length;
                    ctx.strokeStyle = col;
                    index === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Draw Head
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10; ctx.shadowColor = col;
                ctx.beginPath(); ctx.arc(w.x, w.y, 3, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            update();
            requestAnimationFrame(draw);
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(state.money);
            document.getElementById('essence').innerText = state.essence;
            document.getElementById('quota').innerText = state.quota;
            document.getElementById('wave').innerText = state.wave;
        }

        function triggerDraft() {
            state.paused = true;
            const overlay = document.getElementById('draft-overlay');
            overlay.style.display = 'flex';
            const cards = document.getElementById('draft-cards');
            cards.innerHTML = `
                <div class="draft-card" onclick="nextFloor()"><h3>NEW VENTURE</h3><p>Reset floor with +$200 bonus</p></div>
                <div class="draft-card" onclick="nextFloor(1.5)"><h3>GREED</h3><p>Higher Quota, but 2x Credits</p></div>
            `;
        }

        function nextFloor(mult = 1) {
            state.wave++;
            state.essence = 0;
            state.quota = Math.floor(state.quota * 1.5);
            state.money += 200;
            state.buildings = [];
            state.workers = [];
            state.paused = false;
            document.getElementById('draft-overlay').style.display = 'none';
            init();
        }

        window.onresize = init;
        init();
        draw();
    </script>
</body>
</html>
