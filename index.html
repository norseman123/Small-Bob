<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Occult Factory: Descent</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020204; font-family: 'Courier New', Courier, monospace; color: #fff; user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: rgba(8, 8, 12, 0.85); border: 1px solid #223; border-top: 3px solid #bc13fe; padding: 15px 20px; box-shadow: 0 4px 30px rgba(188, 19, 254, 0.15); pointer-events: auto; backdrop-filter: blur(10px); min-width: 200px; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        .stat { font-size: 1.1rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        #toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        button { background: #111; border: 1px solid #bc13fe; color: #fff; padding: 8px 12px; cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #bc13fe; color: #000; }
        button.active { background: #fff; color: #000; border-color: #fff; }
        
        #notifications { position: absolute; top: 20px; right: 20px; z-index: 20; pointer-events: none; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .notification { background: rgba(200, 0, 0, 0.8); color: white; padding: 10px 20px; border-left: 4px solid #ff0000; animation: fadeout 3s forwards; }
        @keyframes fadeout { 0% { opacity: 1; transform: translateX(20px); } 10% { transform: translateX(0); } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="ui">
    <div class="panel">
        <h2>Maw Status</h2>
        <div class="stat" id="wave-ui">Wave: 1</div>
        <div class="stat" id="quota-ui">Quota: 0 / 100</div>
        <div class="stat" id="essence-ui">Total Essence: 0</div>
        <div class="stat" id="money-ui">Ash (Money): 500</div>
    </div>
    <div class="panel">
        <h2>Construct</h2>
        <div id="toolbar">
            </div>
        <div style="margin-top: 15px; border-top: 1px solid #334; padding-top: 15px;">
            <button id="tool-sell">Sell / Destroy</button>
        </div>
    </div>
</div>

<div id="notifications"></div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Static canvas for drawing the grid/background efficiently
    const staticCanvas = document.createElement('canvas');
    const staticCtx = staticCanvas.getContext('2d');

    // Make canvas fill the screen
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    staticCanvas.width = canvas.width;
    staticCanvas.height = canvas.height;

    // Handle Window Resizing
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        staticCanvas.width = canvas.width;
        staticCanvas.height = canvas.height;
        initMap(); // Re-draw map if the window changes
    });
<script>
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.body.appendChild(canvas);
        
        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            if (state && state.map.size > 0) renderStaticBackground();
        }
        window.addEventListener('resize', resize);

        // --- GLOBAL STATE & PROGRESSION ---
        let metaState = { voidAsh: 0, upgrades: {}, unlockedSects: ['occultists'] };
        let state = {
            sect: 'occultists',
            wave: 1,
            quota: 100,
            essence: 0,
            money: 0,
            buildings: [],
            workers: [],
            map: new Map(),
            unlockedBlueprints: [],
            selectedTool: null,
            paused: true,
            buildingsChanged: true,
            globalTime: 0
        };

        const TILE_SIZE = 40;
        let COLS = 0; let ROWS = 0;
        let startingFunds = 500;
        let runStats = { greedMult: 1.0, wispSpeed: 1.5, wispAgility: 0.1, drillSpeed: 30, wispCapacity: 1 };
        const BASE_SELL_VALUE = 2;

        // --- CATALOG (INCLUDING HYPER-COLLIDER) ---
        const CATALOG = {
            basic_generator: { cost: 50, type: 'drill', name: 'DRILL' },
            conveyor: { cost: 10, type: 'tether', name: 'TETHER' },
            purifier: { cost: 150, type: 'purifier', name: 'PURIFIER' },
            aether_pump: { cost: 120, type: 'aether_pump', name: 'AETHER PUMP' },
            vein_splitter: { cost: 200, type: 'vein_splitter', name: 'VEIN SPLITTER' },
            fusion_altar: { cost: 300, type: 'altar', name: 'FUSION ALTAR' },
            gilder: { cost: 200, type: 'gilder', name: 'GILDER' },
            splitter: { cost: 100, type: 'splitter', name: 'SPLITTER' },
            accelerator: { cost: 150, type: 'accelerator', name: 'ACCELERATOR' },
            compressor: { cost: 400, type: 'compressor', name: 'COMPRESSOR' },
            quantum_bore: { cost: 600, type: 'quantum_bore', name: 'QUANTUM BORE' },
            soul_well: { cost: 800, type: 'soul_well', name: 'SOUL WELL' },
            aether_shrine: { cost: 1000, type: 'aether_shrine', name: 'AETHER SHRINE' },
            siphon: { cost: 120, type: 'siphon', name: 'BLOOD SIPHON' },
            flesh_vat: { cost: 250, type: 'flesh_vat', name: 'FLESH VAT' },
            arc_furnace: { cost: 500, type: 'arc_furnace', name: 'ARC FURNACE' },
            hyper_collider: { cost: 1500, type: 'hyper_collider', name: 'HYPER-COLLIDER' }
        };

        // --- META PROGRESSION (SAVE/LOAD) ---
        function saveMetaState() {
            localStorage.setItem('occult_factory_meta', JSON.stringify(metaState));
        }

        function loadMetaState() { 
            const saved = localStorage.getItem('occult_factory_meta'); 
            if (saved) {
                const parsedData = JSON.parse(saved);
                metaState.voidAsh = parsedData.voidAsh || 0;
                if (parsedData.upgrades) metaState.upgrades = { ...metaState.upgrades, ...parsedData.upgrades };
                if (parsedData.unlockedSects) metaState.unlockedSects = parsedData.unlockedSects;
            } 
        }

        // --- GAME INITIALIZATION & SECT LOADOUTS ---
        window.startGame = (sect) => {
            state.sect = sect;
            let vaultBonus = (metaState.upgrades['vault'] || 0) * 100;
            startingFunds = 500 + vaultBonus; 

            // Sect-Specific Blueprints
            if (sect === 'alchemists') state.unlockedBlueprints = ['purifier', 'aether_pump', 'tether', 'gilder', 'accelerator']; 
            else if (sect === 'grave_keepers') state.unlockedBlueprints = ['vein_splitter', 'fusion_altar', 'tether', 'drill', 'splitter']; 
            else if (sect === 'bloodbound') state.unlockedBlueprints = ['siphon', 'flesh_vat', 'tether', 'vein_splitter', 'accelerator'];
            else if (sect === 'machinists') state.unlockedBlueprints = ['drill', 'arc_furnace', 'tether', 'compressor', 'splitter'];
            else state.unlockedBlueprints = ['basic_generator', 'conveyor', 'purifier', 'splitter']; // Default Occultists

            // Inject Meta-Progression Unlocks
            if (metaState.upgrades['unlock_collider']) {
                if (!state.unlockedBlueprints.includes('hyper_collider')) {
                    state.unlockedBlueprints.push('hyper_collider');
                }
            }

            state.money = startingFunds;
            document.getElementById('hub-ui').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('toolbar').style.display = 'flex';
            
            buildToolbar();
            initMap();
            updateUIStats();
            state.paused = false;
        };

        function buildToolbar() {
            const tb = document.getElementById('toolbar');
            tb.innerHTML = '';
            state.unlockedBlueprints.forEach(bpKey => {
                let bp = CATALOG[bpKey];
                let btn = document.createElement('button');
                btn.className = 'blueprint-btn';
                btn.innerHTML = `${bp.name} <br><span style="color:#aaa;">$${bp.cost}</span>`;
                btn.onclick = () => setTool(bpKey);
                tb.appendChild(btn);
            });

            let sellBtn = document.createElement('button');
            sellBtn.className = 'blueprint-btn';
            sellBtn.style.borderTopColor = '#ff003c';
            sellBtn.innerHTML = `SELL / DESTROY`;
            sellBtn.onclick = () => setTool('sell');
            tb.appendChild(sellBtn);
        }

        window.setTool = (t) => {
            state.selectedTool = t;
            let btns = document.querySelectorAll('.blueprint-btn');
            btns.forEach(b => b.classList.remove('active'));
            // Optional: Add logic here to highlight the active button if desired
        };

        // --- MAP GENERATION ---
        // --- MAP GENERATION ---
        function initMap() {
            COLS = Math.ceil(window.innerWidth / TILE_SIZE);
            ROWS = Math.ceil(window.innerHeight / TILE_SIZE);
            state.map.clear();
            
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    let isLeyline = Math.random() < 0.05;
                    let isObstacle = Math.random() < 0.08;
                    if (isLeyline) isObstacle = false;
                    
                    // --- NEW: DIVERSE LEYLINE TYPES ---
                    let lType = 'void';
                    if (isLeyline) {
                        let pool = ['void'];
                        if (metaState.upgrades['leyline_blood']) pool.push('blood');
                        if (metaState.upgrades['leyline_gold']) pool.push('gold');
                        lType = pool[Math.floor(Math.random() * pool.length)];
                    }

                    state.map.set(`${x},${y}`, { 
                        gridX: x, gridY: y, 
                        isLeyline: isLeyline, 
                        leylineType: lType,
                        isObstacle: isObstacle, 
                        occupied: isObstacle,
                        isCorrupted: false 
                    });
                }
            }

            // Spawn the Maw
            let cX = Math.floor(COLS / 2);
            let cY = Math.floor(ROWS / 2);
            for(let dx=-1; dx<=1; dx++) {
                for(let dy=-1; dy<=1; dy++) {
                    let tile = state.map.get(`${cX+dx},${cY+dy}`);
                    if(tile) { tile.occupied = false; tile.isObstacle = false; }
                }
            }
            
            state.map.get(`${cX},${cY}`).occupied = true;
            state.buildings.push({ type: 'maw', x: cX * TILE_SIZE, y: cY * TILE_SIZE, cx: (cX * TILE_SIZE) + (TILE_SIZE / 2), cy: (cY * TILE_SIZE) + (TILE_SIZE / 2), isIgnited: false, rot: 0 });
            
            // --- NEW: RANDOMIZED CLASS MONUMENTS ---
            let uniqueType = 'void_resonator'; 
            if (state.sect === 'alchemists') uniqueType = 'philosophers_stone';
            if (state.sect === 'grave_keepers') uniqueType = 'charnel_gate';
            if (state.sect === 'bloodbound') uniqueType = 'beating_heart';
            if (state.sect === 'machinists') uniqueType = 'tesla_coil';

            // Find all empty tiles at least 5 tiles away from the Maw
            let validSpots = [];
            state.map.forEach(tile => {
                if (!tile.occupied && Math.hypot(tile.gridX - cX, tile.gridY - cY) > 5) {
                    validSpots.push(tile);
                }
            });

            if (validSpots.length > 0) {
                let spot = validSpots[Math.floor(Math.random() * validSpots.length)];
                spot.occupied = true;
                state.buildings.push({
                    type: uniqueType, x: spot.gridX * TILE_SIZE, y: spot.gridY * TILE_SIZE, 
                    cx: (spot.gridX * TILE_SIZE) + (TILE_SIZE / 2), cy: (spot.gridY * TILE_SIZE) + (TILE_SIZE / 2), 
                    rot: 0, timer: 0, inventory: {}, isIgnited: false, isPhantom: false, speedMod: 1, life: Infinity
                });
            }

            renderStaticBackground(); 
            state.buildingsChanged = true;
        }

        function renderStaticBackground() {
            bgCtx.fillStyle = '#020204';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.strokeStyle = '#0a0a12';
            bgCtx.lineWidth = 1;

            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    bgCtx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    let tile = state.map.get(`${x},${y}`);
                    if (tile && tile.isObstacle) {
                        bgCtx.fillStyle = '#050508';
                        bgCtx.fillRect(x * TILE_SIZE + 2, y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        bgCtx.strokeStyle = '#112';
                        bgCtx.beginPath();
                        bgCtx.moveTo(x * TILE_SIZE + 5, y * TILE_SIZE + 5);
                        bgCtx.lineTo(x * TILE_SIZE + TILE_SIZE - 5, y * TILE_SIZE + TILE_SIZE - 5);
                        bgCtx.stroke();
                    }
                }
            }
        }

        // --- ROGUELIKE WAVE RESETS ---
        function triggerDraft() { 
            state.paused = true; 
            document.getElementById('draft-overlay').style.display = 'flex';
            // You can add logic here to generate random draft cards
        }

        window.endDraft = function() { 
            document.getElementById('draft-overlay').style.display = 'none'; 
            
            // Advance wave and scale quota
            state.wave++; 
            state.quota = Math.floor(state.quota * 1.5); 
            state.essence = 0; 
            
            // Hard floor reset
            state.money = startingFunds; 
            state.buildings = [];        
            state.workers = [];          
            state.map.clear();       
            
            initMap();                   
            updateUIStats(); 
            state.paused = false; 
        };

        function updateUIStats() {
            document.getElementById('wave-display').innerText = `WAVE: ${state.wave}`;
            document.getElementById('essence-display').innerText = `ESSENCE: ${Math.floor(state.essence)} / ${state.quota}`;
            document.getElementById('money-display').innerText = `FUNDS: $${Math.floor(state.money)}`;
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.style.position = 'absolute';
            notif.style.top = '100px';
            notif.style.left = '50%';
            notif.style.transform = 'translateX(-50%)';
            notif.style.background = 'rgba(188, 19, 254, 0.8)';
            notif.style.color = '#fff';
            notif.style.padding = '10px 20px';
            notif.style.borderRadius = '5px';
            notif.style.fontWeight = 'bold';
            notif.style.zIndex = '1000';
            notif.style.pointerEvents = 'none';
            notif.innerText = msg;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transition = 'opacity 1s';
                setTimeout(() => notif.remove(), 1000);
            }, 2000);
        }

        // --- INPUT HANDLING ---
        canvas.addEventListener('mousedown', (e) => {
            if (state.paused) return;
            let gridX = Math.floor(e.clientX / TILE_SIZE);
            let gridY = Math.floor(e.clientY / TILE_SIZE);
            let key = `${gridX},${gridY}`;
            let tile = state.map.get(key);

            if (!tile) return;

            if (state.selectedTool === 'sell') {
                let bIdx = state.buildings.findIndex(b => Math.floor(b.x/TILE_SIZE) === gridX && Math.floor(b.y/TILE_SIZE) === gridY && b.type !== 'maw');
                if (bIdx > -1) {
                    let b = state.buildings[bIdx];
                    // If it's a phantom, don't refund money, just clear it
                    if (!b.isPhantom) {
                        let refund = Math.floor(CATALOG[b.type].cost * 0.5);
                        state.money += refund;
                    }
                    state.buildings.splice(bIdx, 1);
                    tile.occupied = false;
                    state.buildingsChanged = true;
                    updateUIStats();
                }
                return;
            }

            if (!state.selectedTool || tile.occupied || tile.isObstacle) return;

            let bp = CATALOG[state.selectedTool];
            if (state.money >= bp.cost) {
                state.money -= bp.cost;
                tile.occupied = true;
                
                let isLeyline = tile.isLeyline;
                let onCorrupted = tile.isCorrupted;

                state.buildings.push({
                    type: bp.type,
                    x: gridX * TILE_SIZE,
                    y: gridY * TILE_SIZE,
                    cx: (gridX * TILE_SIZE) + (TILE_SIZE / 2),
                    cy: (gridY * TILE_SIZE) + (TILE_SIZE / 2),
                    rot: 0,
                    timer: 0,
                    inventory: { stored: 0 },
                    isIgnited: false,
                    isPhantom: false,
                    phantomTick: false,
                    speedMod: 1,
                    life: 500, // For combustion mechanics
                    isLeyline: isLeyline,
                    onCorrupted: onCorrupted,
                    toggle: false
                });

                if (isLeyline && state.sect === 'occultists' && Math.random() < 0.3) {
                    tile.isCorrupted = true;
                }

                state.buildingsChanged = true;
                updateUIStats();
            }
        });

        // Initialize display sizes and meta
        resize();
        loadMetaState();
// --- GAME UPDATE LOOP ---
        function update() {
            if (state.paused) return;
            state.globalTime += 0.05;
            
            const targetMaw = state.buildings.find(b => b.type === 'maw');
            if (!targetMaw) return;
            const interactables = state.buildings.filter(b => b.type !== 'maw' && !['drill', 'siphon', 'aether_pump', 'quantum_bore', 'soul_well', 'aether_shrine', 'arc_furnace'].includes(b.type));

            for (let i = state.buildings.length - 1; i >= 0; i--) {
                let b = state.buildings[i]; let speedMult = b.onCorrupted ? 2 : 1;
                
                // Gravekeeper Phantom Capacity Trick (skip every other frame)
                if (b.isPhantom) {
                    b.phantomTick = !b.phantomTick;
                    if (!b.phantomTick) continue; 
                }

                b.rot += 0.02 * speedMult; 
                
                if (b.isIgnited) {
                    speedMult *= b.speedMod; b.life--; b.rot += 0.05;

                    // Alchemist Philosopher's State
                    if (state.sect === 'alchemists') {
                        state.workers.forEach(w => {
                            if (w.type !== 'astral' && !w.consumed) {
                                let dist = Math.hypot(w.x - b.cx, w.y - b.cy);
                                if (dist < 18) {
                                    w.type = 'astral'; w.speedMult = 1.5; b.life -= 80; 
                                }
                            }
                        });
                    }

                    // Voidweaver Black Hole Pull
                    if (b.isBlackHole) {
                        b.rot += 0.15;
                        state.workers.forEach(w => {
                            let dist = Math.hypot(w.x - b.cx, w.y - b.cy);
                            if (dist < TILE_SIZE * 3.5) {
                                w.vx += (b.cx - w.x) * 0.06; w.vy += (b.cy - w.y) * 0.06;
                                if (dist < 10 && !w.consumed) {
                                    b.inventory[w.type] = (b.inventory[w.type] || 0) + 1;
                                    w.consumed = true;
                                }
                            }
                        });
                        state.workers = state.workers.filter(w => !w.consumed);
                    }

                    // BUILDING DEATH LOGIC
                    if (b.life <= 0) {
                        let cX = Math.floor(b.x/TILE_SIZE); let cY = Math.floor(b.y/TILE_SIZE);
                        
                        // Grave Keepers: Phantom Industry (On Death)
                        if (state.sect === 'gravekeepers' && !b.isPhantom) {
                            let phantomExists = state.buildings.some(other => other.isPhantom && other.cx === b.cx && other.cy === b.cy && other !== b);
                            if (!phantomExists) {
                                b.isPhantom = true; b.isIgnited = false; b.life = Infinity; b.speedMod = 1;
                                state.map.get(`${cX},${cY}`).occupied = false; // Free the tile!
                                state.buildingsChanged = true;
                                continue; // Skip deletion
                            }
                        }

                        // Bloodbound / Machinist Explosions
                        if (state.sect === 'bloodbound') {
                            if (b.type === 'flesh_vat') {
                                let count = Math.max(1, b.inventory.stored);
                                for(let j=0; j<count; j++) state.workers.push({ x: b.cx, y: b.cy, vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3, trail: [], type: 'ichor', hasSplit: false, speedMult: 1.2, target: null, lastVisited: null });
                            } else {
                                for(let j=0; j<3; j++) state.workers.push({ x: b.cx, y: b.cy, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, trail: [], type: 'blood', hasSplit: false, speedMult: 1, target: null, lastVisited: null });
                            }
                        }
                        
                        if (state.sect === 'machinists') {
                            let bonusLife = metaState.upgrades.casingDurability * 50;
                            state.buildings.forEach(otherB => {
                                if (!otherB.isIgnited && otherB.type !== 'maw' && Math.hypot(otherB.cx - b.cx, otherB.cy - b.cy) < TILE_SIZE * 1.5) {
                                    otherB.isIgnited = true; otherB.life = 450 + bonusLife; otherB.speedMod = 2.5;
                                    if (otherB.type === 'arc_furnace') { for(let k=0; k<3; k++) state.workers.push({ x: otherB.cx, y: otherB.cy, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, trail: [], type: 'plasma', hasSplit: false, speedMult: 2.5, target: null, lastVisited: null }); }
                                }
                            });
                        }

                        if (b.isBlackHole) {
                            let voidConsumed = b.inventory.void || 0;
                            let totalConsumed = 0;
                            for (let key in b.inventory) { if(key !== 'stored') totalConsumed += b.inventory[key]; }
                            let abyssalCount = Math.floor(voidConsumed / 2); let denseCount = Math.floor((totalConsumed - voidConsumed) / 3);
                            for(let j=0; j<abyssalCount; j++) state.workers.push({ x: b.cx, y: b.cy, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, trail: [], type: 'abyssal', hasSplit: false, speedMult: 1.5, target: null, lastVisited: null });
                            for(let j=0; j<denseCount; j++) state.workers.push({ x: b.cx, y: b.cy, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, trail: [], type: 'dense', hasSplit: false, speedMult: 0.8, target: null, lastVisited: null });
                        }

                        let tile = state.map.get(`${cX},${cY}`);
                        if (tile) tile.occupied = false;
                        state.buildings.splice(i, 1); state.buildingsChanged = true; continue;
                    }
                }

                // Spawners
                if (b.type === 'drill') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed) { b.timer = 0; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: 'gold', hasSplit: false, speedMult: 1, target: null, lastVisited: null }); } }
                if (b.type === 'siphon') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed * 1.5) { b.timer = 0; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: 'blood', hasSplit: false, speedMult: 1, target: null, lastVisited: null }); } }
                if (b.type === 'aether_pump') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed * 1.2) { b.timer = 0; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: 'void', hasSplit: false, speedMult: 1, target: null, lastVisited: null }); } }
                if (b.type === 'quantum_bore') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed) { b.timer = 0; b.toggle = !b.toggle; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: b.toggle ? 'gold' : 'void', hasSplit: false, speedMult: 1, target: null, lastVisited: null }); } }
                if (b.type === 'soul_well') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed * 1.8) { b.timer = 0; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: 'soul', hasSplit: false, speedMult: 0.7, target: null, lastVisited: null }); } }
                if (b.type === 'aether_shrine') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed * 1.4) { b.timer = 0; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: 'aether', hasSplit: false, speedMult: 1, target: null, lastVisited: null }); } }
                if (b.type === 'arc_furnace') { b.timer += speedMult; if (b.timer >= runStats.drillSpeed * 1.5) { b.timer = 0; state.workers.push({ x: b.cx, y: b.cy, vx: 0, vy: 0, trail: [], type: 'plasma', hasSplit: false, speedMult: 2.0, target: null, lastVisited: null }); } }
            }

            let newWorkers = [];
            
            // Wisps targeting logic
            for (let i = state.workers.length - 1; i >= 0; i--) {
                let w = state.workers[i];
                if (!w.target || !state.buildings.includes(w.target) || state.buildingsChanged) {
                    w.target = targetMaw;
                    let validInteractables = interactables.filter(b => {
                        if ((b.type === 'tether' || b.isPhantom) && w.lastVisited === b) return false;
                        if (b.isPhantom || b.type === 'tether' || b.type === 'flesh_vat') return true; 
                        if (w.type === 'gold' && b.type === 'purifier') return true;
                        if (w.type === 'void' && b.type === 'gilder') return true;
                        if (['void', 'blood', 'gold', 'soul', 'compressed', 'astral'].includes(w.type) && b.type === 'altar' && (b.inventory[w.type] || 0) < 1) return true;
                        if (['abyssal', 'crimson', 'phantom', 'sanguine'].includes(w.type) && b.type === 'hyper_collider' && (b.inventory[w.type] || 0) < 1) return true;
                        if (b.type === 'splitter' && !w.hasSplit) return true;
                        if (w.type === 'blood' && b.type === 'vein_splitter' && !w.hasSplit) return true;
                        if (b.type === 'accelerator' && w.speedMult === 1) return true;
                        if (b.type === 'compressor' && w.type !== 'dense' && w.type !== 'abyssal') return true; 
                        return false;
                    });
                    
                    if (validInteractables.length > 0) {
                        let nearestInt = validInteractables[0]; let dInt = Math.hypot(nearestInt.cx - w.x, nearestInt.cy - w.y);
                        for(let j=1; j<validInteractables.length; j++){ 
                            let d = Math.hypot(validInteractables[j].cx - w.x, validInteractables[j].cy - w.y); 
                            if(d < dInt) { dInt = d; nearestInt = validInteractables[j]; } 
                        }
                        if (dInt < Math.hypot(targetMaw.cx - w.x, targetMaw.cy - w.y)) w.target = nearestInt;
                    }
                }

                let dx = w.target.cx - w.x; let dy = w.target.cy - w.y; let dist = Math.hypot(dx, dy);

                if (dist < 15) {
                    if (w.target.type === 'maw') {
                        // Apocalypse Screen Wipe!
                        if (w.type === 'apocalypse') {
                            let totalBonusMoney = 0; let totalBonusEssence = 0; let destroyedCount = 0;
                            state.workers.forEach(otherWisp => {
                                if (!otherWisp.consumed && otherWisp !== w) {
                                    totalBonusMoney += 150 * runStats.greedMult; totalBonusEssence += 5;
                                    otherWisp.consumed = true; destroyedCount++;
                                }
                            });
                            state.money += totalBonusMoney; state.essence += totalBonusEssence;
                            showNotification(`APOCALYPSE! ${destroyedCount} wisps consumed for $${Math.floor(totalBonusMoney)}!`);
                        } else {
                            let val = w.type === 'dense' ? 5 : (w.type === 'abyssal' ? 4 : (w.type === 'crimson' ? 10 : (w.type === 'astral' ? 25 : (w.type === 'ichor' ? 15 : (w.type === 'plasma' ? 3 : 1)))));
                            if (['gold', 'blood', 'dense', 'abyssal', 'crimson', 'eclipse', 'soul', 'astral', 'ichor', 'plasma', 'sanguine', 'radiant', 'diamond', 'cosmic', 'poltergeist'].includes(w.type)) {
                                let baseCash = (w.type === 'soul') ? 5 : (w.type === 'aether' ? 0 : BASE_SELL_VALUE);
                                if (w.type === 'radiant') state.money += 250;
                                else state.money += baseCash * val * runStats.greedMult * (w.type === 'blood' ? 2.5 : 1);
                            }
                            if (['void', 'dense', 'abyssal', 'eclipse', 'soul', 'aether', 'astral', 'ichor', 'plasma', 'phantom', 'singularity', 'ethereal'].includes(w.type) || (w.type === 'blood' && state.sect === 'bloodbound')) {
                                let essenceVal = (w.type === 'soul') ? 2 : (w.type === 'phantom' ? 5 : (w.type === 'singularity' ? 15 : (w.type === 'astral' ? 8 : (w.type === 'ichor' ? 5 : 1))));
                                state.essence += runStats.wispCapacity * essenceVal * val * (state.sect === 'alchemists' && w.type === 'void' ? 3 : 1);
                            }
                            if (w.type === 'eclipse') { runStats.greedMult += 0.02; }
                        }
                        
                        if (state.essence >= state.quota && !state.paused) triggerDraft();
                        state.workers.splice(i, 1); updateUIStats(); continue;
                    } 
                    else if (w.target.type === 'tether' || w.target.isPhantom) { w.lastVisited = w.target; w.target = null; }
                    else if (w.target.type === 'purifier') { w.type = 'void'; w.lastVisited = w.target; w.target = null; } 
                    else if (w.target.type === 'gilder') { w.type = 'gold'; w.lastVisited = w.target; w.target = null; } 
                    else if (w.target.type === 'flesh_vat') { w.target.inventory.stored++; state.workers.splice(i, 1); continue; }
                    else if (w.target.type === 'splitter' && !w.hasSplit) { w.hasSplit = true; w.vx *= -1; w.lastVisited = w.target; w.target = null; newWorkers.push({...w, trail: [], vx: -w.vx, vy: -w.vy, target: null}); }
                    else if (w.target.type === 'vein_splitter' && w.type === 'blood' && !w.hasSplit) { w.hasSplit = true; w.vx *= -1; w.lastVisited = w.target; w.target = null; newWorkers.push({...w, trail: [], vx: -w.vx, vy: -w.vy, target: null}); w.target.life = w.target.isIgnited ? w.target.life : 10; }
                    else if (w.target.type === 'accelerator') { w.speedMult = 2; w.lastVisited = w.target; w.target = null; }
                    else if (w.target.type === 'compressor') { w.target.inventory.stored++; state.workers.splice(i, 1); if (w.target.inventory.stored >= 3) { w.target.inventory.stored = 0; newWorkers.push({ x: w.target.cx, y: w.target.cy, vx: 0, vy: 0, trail: [], type: 'dense', hasSplit: false, speedMult: 0.8, target: null, lastVisited: null }); } continue; }
                    
                    // Fusion Altar & Hyper Collider Fusions
                    else if (w.target.type === 'altar' || w.target.type === 'hyper_collider') {
                        w.target.inventory[w.type] = (w.target.inventory[w.type] || 0) + 1; state.workers.splice(i, 1);
                        let inv = w.target.inventory; let spawnType = null;
                        
                        if (w.target.type === 'altar') {
                            if (inv.void >= 1 && inv.blood >= 1) { inv.void--; inv.blood--; spawnType = 'abyssal'; } 
                            else if (inv.gold >= 1 && inv.blood >= 1) { inv.gold--; inv.blood--; spawnType = 'crimson'; } 
                            else if (inv.gold >= 1 && inv.void >= 1) { inv.gold--; inv.void--; spawnType = 'eclipse'; }
                            else if (inv.soul >= 1 && inv.void >= 1) { inv.soul--; inv.void--; spawnType = 'phantom'; }
                            else if (inv.soul >= 1 && inv.blood >= 1) { inv.soul--; inv.blood--; spawnType = 'sanguine'; }
                            else if (inv.soul >= 1 && inv.gold >= 1) { inv.soul--; inv.gold--; spawnType = 'radiant'; }
                            else if (inv.compressed >= 1 && inv.void >= 1) { inv.compressed--; inv.void--; spawnType = 'singularity'; }
                            else if (inv.compressed >= 1 && inv.gold >= 1) { inv.compressed--; inv.gold--; spawnType = 'diamond'; }
                            else if (inv.astral >= 1 && inv.blood >= 1) { inv.astral--; inv.blood--; spawnType = 'cosmic'; }
                            else if (inv.astral >= 1 && inv.soul >= 1) { inv.astral--; inv.soul--; spawnType = 'ethereal'; }
                        } else if (w.target.type === 'hyper_collider') {
                            if (inv.abyssal >= 1 && inv.crimson >= 1) { inv.abyssal--; inv.crimson--; spawnType = 'apocalypse'; }
                            else if (inv.phantom >= 1 && inv.sanguine >= 1) { inv.phantom--; inv.sanguine--; spawnType = 'poltergeist'; }
                        }

                        if (spawnType) { newWorkers.push({ x: w.target.cx, y: w.target.cy, vx: 0, vy: 0, trail: [], type: spawnType, hasSplit: false, speedMult: 1.2, target: null, lastVisited: null }); } continue; 
                    }
                }

                let speed = runStats.wispSpeed * w.speedMult;
                let dvx = (dx/dist) * speed; let dvy = (dy/dist) * speed;
                
                if (!w.target || !w.target.isPhantom) {
                    let tile = state.map.get(`${Math.floor((w.x + dvx*6)/TILE_SIZE)},${Math.floor((w.y + dvy*6)/TILE_SIZE)}`);
                    if (tile && tile.isObstacle) { let t = dvx; dvx = -dvy; dvy = t; }
                }

                w.vx += (dvx - w.vx) * runStats.wispAgility; w.vy += (dvy - w.vy) * runStats.wispAgility;
                w.x += w.vx; w.y += w.vy; w.trail.push({x: w.x, y: w.y});
                if (w.trail.length > 8) w.trail.shift();
            }
            state.workers.push(...newWorkers);
            state.workers = state.workers.filter(w => !w.consumed); // Clean up destroyed wisps
            state.buildingsChanged = false;
        }

        // --- GRAPHICS UPGRADE: RENDERING ENGINE ---
        function drawBuildingShape(b) {
            ctx.save();
            ctx.translate(b.cx, b.cy);
            
            if (b.isPhantom) {
                ctx.globalAlpha = 0.4 + (Math.sin(state.globalTime * 3) * 0.2); 
                ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff'; ctx.strokeStyle = '#00f2ff';
                ctx.beginPath(); ctx.arc(0, 0, TILE_SIZE/2.5, 0, Math.PI*2); ctx.stroke();
                ctx.rotate(b.rot); ctx.strokeRect(-10, -10, 20, 20); ctx.restore(); return;
            }

            if (b.isBlackHole) {
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 30; ctx.shadowColor = '#8a2be2'; ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(0, 0, TILE_SIZE/3, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#bc13fe'; ctx.lineWidth = 2; ctx.rotate(-b.rot * 2);
                for(let i=0; i<4; i++) { ctx.beginPath(); ctx.arc(0, 0, TILE_SIZE/2, i * Math.PI/2, (i * Math.PI/2) + Math.PI/4); ctx.stroke(); }
                ctx.restore(); return;
            }

            ctx.lineWidth = 2;
            ctx.shadowBlur = b.isIgnited ? 25 : 10;
            ctx.shadowColor = b.isIgnited ? '#ff2200' : '#112233';
            ctx.fillStyle = b.isIgnited ? '#3a0808' : '#0d0d14';
            ctx.strokeStyle = b.isIgnited ? '#ff4400' : '#334455';
            ctx.fillRect(-TILE_SIZE/2 + 3, -TILE_SIZE/2 + 3, TILE_SIZE - 6, TILE_SIZE - 6);
            ctx.strokeRect(-TILE_SIZE/2 + 3, -TILE_SIZE/2 + 3, TILE_SIZE - 6, TILE_SIZE - 6);

            ctx.shadowBlur = b.isIgnited ? 30 : 15;
            
            if (b.type === 'maw') {
                ctx.shadowColor = '#bc13fe'; ctx.strokeStyle = '#bc13fe';
                ctx.rotate(b.rot);
                ctx.beginPath(); ctx.arc(0, 0, TILE_SIZE/3, 0, Math.PI*2); ctx.stroke();
                ctx.strokeRect(-8, -8, 16, 16);
            } 
            else if (['drill', 'quantum_bore', 'siphon'].includes(b.type)) {
                ctx.shadowColor = b.type === 'drill' ? '#ffd700' : (b.type === 'siphon' ? '#ff003c' : '#ffffff');
                ctx.strokeStyle = ctx.shadowColor; ctx.rotate(b.rot);
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(10, 0); ctx.lineTo(0, 10); ctx.lineTo(-10, 0); ctx.closePath(); ctx.stroke();
            }
            else if (['purifier', 'gilder', 'compressor'].includes(b.type)) {
                ctx.shadowColor = b.type === 'purifier' ? '#8a2be2' : (b.type === 'gilder' ? '#ffd700' : '#888');
                ctx.strokeStyle = ctx.shadowColor;
                ctx.strokeRect(-10, -10, 20, 20); ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.stroke();
            }
            else if (b.type === 'tether' || b.type === 'accelerator') {
                ctx.shadowColor = '#00f2ff'; ctx.strokeStyle = ctx.shadowColor;
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.moveTo(0, -10); ctx.lineTo(0, 10); ctx.stroke();
            }
            else if (b.type === 'hyper_collider') {
                ctx.shadowColor = '#ff4500'; ctx.strokeStyle = '#ff4500';
                ctx.rotate(b.rot * 2); ctx.strokeRect(-12, -12, 24, 24); ctx.rotate(Math.PI/4); ctx.strokeRect(-12, -12, 24, 24);
            }
            else {
                ctx.shadowColor = '#fff'; ctx.strokeStyle = '#fff';
                ctx.rotate(-b.rot);
                ctx.beginPath(); ctx.moveTo(-8, -8); ctx.lineTo(8, 8); ctx.moveTo(8, -8); ctx.lineTo(-8, 8); ctx.stroke();
            }

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgCanvas, 0, 0);

            let pulse = (Math.sin(state.globalTime * 2) + 1) / 2; 

        state.map.forEach(tile => {
                if (tile.isLeyline) {
                    let rgb = '0, 242, 255'; // Default Void (Blue)
                    if (tile.leylineType === 'blood') rgb = '255, 0, 60';   // Blood (Red)
                    if (tile.leylineType === 'gold') rgb = '255, 215, 0';   // Gold (Yellow)
                    if (tile.isCorrupted) rgb = '138, 43, 226';             // Corrupted (Purple)

                    ctx.fillStyle = `rgba(${rgb}, ${0.05 + (pulse * 0.15)})`;
                    ctx.fillRect(tile.gridX*TILE_SIZE, tile.gridY*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            });

            state.buildings.forEach(b => drawBuildingShape(b));

            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            state.workers.forEach(w => {
                let wColor = '#fff';
                if (w.type === 'gold') wColor = '#ffd700'; else if (w.type === 'blood') wColor = '#ff003c';
                else if (w.type === 'void') wColor = '#8a2be2'; else if (w.type === 'soul') wColor = '#00f2ff';
                else if (w.type === 'aether') wColor = '#bbffcc'; else if (w.type === 'plasma') wColor = '#00ff41';
                else if (w.type === 'ichor') wColor = '#88001b'; else if (w.type === 'astral') wColor = '#ffffff';
                else if (w.type === 'dense') wColor = '#ffaa00'; else if (w.type === 'abyssal') wColor = '#4a0080';
                else if (w.type === 'crimson') wColor = '#ff0000'; else if (w.type === 'eclipse') wColor = '#555555';
                else if (w.type === 'phantom') wColor = '#aaccff'; else if (w.type === 'sanguine') wColor = '#ff007f';
                else if (w.type === 'radiant') wColor = '#ffea00'; else if (w.type === 'singularity') wColor = '#000000';
                else if (w.type === 'diamond') wColor = '#00ffff'; else if (w.type === 'cosmic') wColor = '#8a2be2';
                else if (w.type === 'ethereal') wColor = '#00fa9a'; else if (w.type === 'apocalypse') wColor = '#ff4500';
                else if (w.type === 'poltergeist') wColor = '#adff2f';

                if(w.trail.length > 1) {
                    ctx.shadowBlur = 15; ctx.shadowColor = wColor; ctx.strokeStyle = wColor;
                    ctx.beginPath();
                    for(let i=0; i<w.trail.length; i++) {
                        ctx.lineWidth = (i / w.trail.length) * (['ichor', 'dense', 'abyssal', 'apocalypse', 'singularity'].includes(w.type) ? 6 : 4);
                        ctx.globalAlpha = (i / w.trail.length) * 0.8;
                        if(i===0) ctx.moveTo(w.trail[i].x, w.trail[i].y);
                        else ctx.lineTo(w.trail[i].x, w.trail[i].y);
                    }
                    ctx.stroke();
                }
                
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 20; ctx.shadowColor = wColor;
                ctx.fillStyle = '#fff'; 
                ctx.beginPath();
                ctx.arc(w.x, w.y, ['ichor', 'dense', 'abyssal', 'apocalypse', 'singularity'].includes(w.type) ? 5 : 3, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.shadowBlur = 0;

            if (!state.paused) update();
            requestAnimationFrame(draw);
        }

        requestAnimationFrame(draw);
    </script>
</body>
