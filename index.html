<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Occult Factory: Descent (v2)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050507; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        
        /* CRT Overlay Effect */
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #ui { position: absolute; top: 20px; left: 20px; z-index: 11; pointer-events: none; display: flex; flex-direction: column; gap: 15px; }
        .panel {
            background: rgba(10, 10, 15, 0.9); border: 1px solid #444; border-top: 3px solid #bc13fe;
            padding: 15px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); pointer-events: auto; backdrop-filter: blur(8px); min-width: 220px;
        }

        h2 { margin: 0 0 10px 0; font-size: 1rem; color: #bc13fe; text-transform: uppercase; letter-spacing: 3px;}
        .stat { font-size: 1rem; margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .money-text { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        .essence-text { color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }

        .blueprint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button.blueprint-btn {
            background: #12121a; color: #888; border: 1px solid #333; padding: 8px; 
            cursor: pointer; font-family: inherit; font-size: 0.75rem; transition: 0.2s;
        }
        button.blueprint-btn:hover { border-color: #bc13fe; color: #fff; background: #1a1a28; }
        button.blueprint-btn.active { background: #bc13fe22; border-color: #bc13fe; color: #fff; }

        #draft-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 10, 0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        .draft-card {
            background: #0a0a0f; border: 1px solid #bc13fe; width: 220px; padding: 25px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .draft-card:hover { transform: scale(1.05); box-shadow: 0 0 30px #bc13fe44; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="panel">
            <h2>System Status [F-<span id="wave">1</span>]</h2>
            <div class="stat">CREDITS: <span class="money-text">$<span id="money">500</span></span></div>
            <div class="stat">QUOTA: <span class="essence-text"><span id="essence">0</span>/<span id="quota">50</span></span></div>
        </div>

        <div class="panel">
            <h2>Blueprints</h2>
            <div class="blueprint-grid" id="blueprint-list">
                </div>
        </div>
    </div>

    <div id="draft-overlay">
        <h1 style="color: #bc13fe; letter-spacing: 10px;">EVOLUTION SELECT</h1>
        <div style="display: flex; gap: 20px;" id="draft-cards"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 40;

        let state = {
            money: 500, essence: 0, quota: 50, wave: 1,
            selectedTool: null, buildings: [], workers: [],
            map: new Map(), paused: false,
            unlocked: ['drill', 'purifier', 'condenser']
        };

        const CATALOG = {
            drill: { name: "DRILL", cost: 50, color: "#00f2ff", icon: "⛏️" },
            purifier: { name: "PURIFIER", cost: 150, color: "#bc13fe", icon: "🔮" },
            condenser: { name: "CONDENSER", cost: 200, color: "#ff8800", icon: "💎" },
            prism: { name: "PRISM", cost: 400, color: "#ffffff", icon: "🌈" }
        };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            state.map.clear();
            const cols = Math.ceil(canvas.width / TILE_SIZE);
            const rows = Math.ceil(canvas.height / TILE_SIZE);

            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    let isLey = Math.random() < 0.08;
                    let isObs = !isLey && Math.random() < 0.15;
                    state.map.set(`${x},${y}`, { isLey, isObs, occupied: isObs });
                }
            }

            const cx = Math.floor(cols/2), cy = Math.floor(rows/2);
            state.buildings.push({ type: 'maw', cx: cx*TILE_SIZE + 20, cy: cy*TILE_SIZE + 20 });
            renderBlueprintList();
        }

        function renderBlueprintList() {
            const container = document.getElementById('blueprint-list');
            container.innerHTML = '';
            state.unlocked.forEach(id => {
                const b = CATALOG[id];
                const btn = document.createElement('button');
                btn.className = `blueprint-btn ${state.selectedTool === id ? 'active' : ''}`;
                btn.innerHTML = `${b.icon}<br>$${b.cost}`;
                btn.onclick = () => { state.selectedTool = id; renderBlueprintList(); };
                container.appendChild(btn);
            });
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!state.selectedTool) return;
            const gx = Math.floor(e.clientX / TILE_SIZE);
            const gy = Math.floor(e.clientY / TILE_SIZE);
            const tile = state.map.get(`${gx},${gy}`);

            if (tile && !tile.occupied && state.money >= CATALOG[state.selectedTool].cost) {
                if (state.selectedTool === 'drill' && !tile.isLey) return;
                
                state.money -= CATALOG[state.selectedTool].cost;
                state.buildings.push({
                    type: state.selectedTool,
                    cx: gx * TILE_SIZE + TILE_SIZE/2,
                    cy: gy * TILE_SIZE + TILE_SIZE/2
                });
                tile.occupied = true;
                updateUI();
            }
        });

        function update() {
            if (state.paused) return;

            state.buildings.forEach(b => {
                if (b.type === 'drill') {
                    b.timer = (b.timer || 0) + 1;
                    if (b.timer > 100) {
                        state.workers.push({ 
                            x: b.cx, y: b.cy, vx: 0, vy: 0, 
                            type: 'gold', val: 15, cap: 1, trail: [] 
                        });
                        b.timer = 0;
                    }
                }
            });

            const maw = state.buildings.find(b => b.type === 'maw');

            state.workers.forEach((w, i) => {
                // Better Targeting Logic
                let target = maw;
                let potentialSteps = state.buildings.filter(b => {
                    if (w.type === 'gold' && (b.type === 'purifier' || b.type === 'condenser')) return true;
                    if (w.type === 'void' && b.type === 'prism') return true;
                    return false;
                });

                if (potentialSteps.length > 0) {
                    target = potentialSteps.reduce((prev, curr) => 
                        Math.hypot(curr.cx - w.x, curr.cy - w.y) < Math.hypot(prev.cx - w.x, prev.cy - w.y) ? curr : prev
                    );
                }

                const dx = target.cx - w.x, dy = target.cy - w.y;
                const dist = Math.hypot(dx, dy);

                // Interactions
                if (dist < 15) {
                    if (target.type === 'maw') {
                        if (w.type === 'gold') state.money += w.val;
                        else state.essence += w.cap;
                        state.workers.splice(i, 1);
                        if (state.essence >= state.quota) triggerDraft();
                        updateUI();
                        return;
                    }
                    if (target.type === 'purifier') w.type = 'void';
                    if (target.type === 'condenser' && !w.condensed) {
                        w.val *= 2; w.cap *= 2; w.condensed = true;
                    }
                    if (target.type === 'prism') w.type = 'prismatic';
                }

                // Physics & Collision Fix
                let speed = w.condensed ? 1.5 : 3;
                w.vx += (dx / dist * speed - w.vx) * 0.05;
                w.vy += (dy / dist * speed - w.vy) * 0.05;
                
                // Obstacle Push-out
                const gx = Math.floor(w.x / TILE_SIZE), gy = Math.floor(w.y / TILE_SIZE);
                const tile = state.map.get(`${gx},${gy}`);
                if (tile && tile.isObs) {
                    w.vx *= -1.2; w.vy *= -1.2; // Bounce
                    w.x += w.vx * 2; w.y += w.vy * 2; // Immediate push
                }

                w.x += w.vx; w.y += w.vy;
                w.trail.push({x: w.x, y: w.y});
                if (w.trail.length > 10) w.trail.shift();
            });
        }

        function draw() {
            ctx.fillStyle = '#050507';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Map
            state.map.forEach((tile, key) => {
                const [x, y] = key.split(',').map(Number);
                if (tile.isLey) {
                    ctx.fillStyle = '#bc13fe11';
                    ctx.beginPath(); ctx.arc(x*TILE_SIZE+20, y*TILE_SIZE+20, 15, 0, Math.PI*2); ctx.fill();
                }
                if (tile.isObs) {
                    ctx.fillStyle = '#111118';
                    ctx.fillRect(x*TILE_SIZE+4, y*TILE_SIZE+4, TILE_SIZE-8, TILE_SIZE-8);
                }
            });

            // Draw Buildings
            state.buildings.forEach(b => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = b.type === 'maw' ? '#ff0055' : (CATALOG[b.type]?.color || '#fff');
                ctx.fillStyle = ctx.shadowColor;
                ctx.beginPath();
                ctx.arc(b.cx, b.cy, b.type==='maw'? 18 : 10, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Draw Wisps
            state.workers.forEach(w => {
                let color = w.type === 'gold' ? '#ffd700' : w.type === 'void' ? '#bc13fe' : '#00f2ff';
                ctx.strokeStyle = color + '44';
                ctx.lineWidth = 2;
                ctx.beginPath();
                w.trail.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
                
                ctx.fillStyle = color;
                ctx.shadowBlur = 10; ctx.shadowColor = color;
                ctx.beginPath(); ctx.arc(w.x, w.y, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            });

            update();
            requestAnimationFrame(draw);
        }

        function updateUI() {
            document.getElementById('money').innerText = state.money;
            document.getElementById('essence').innerText = state.essence;
            document.getElementById('quota').innerText = state.quota;
            document.getElementById('wave').innerText = state.wave;
        }

        function triggerDraft() {
            state.paused = true;
            const overlay = document.getElementById('draft-overlay');
            const container = document.getElementById('draft-cards');
            overlay.style.display = 'flex';
            container.innerHTML = '';

            const options = [
                { name: 'VOID PRISM', type: 'prism', desc: 'Converts Void to Prismatic (3x Value)' },
                { name: 'EFFICIENCY', type: 'relic', desc: 'Drills 50% faster' }
            ];

            options.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'draft-card';
                card.innerHTML = `<h3>${opt.name}</h3><p>${opt.desc}</p>`;
                card.onclick = () => {
                    if (opt.type === 'prism') state.unlocked.push('prism');
                    state.wave++;
                    state.essence = 0;
                    state.quota += 50;
                    state.money += 200;
                    state.paused = false;
                    overlay.style.display = 'none';
                    init();
                };
                container.appendChild(card);
            });
        }

        window.onresize = init;
        init();
        draw();
    </script>
</body>
</html>
