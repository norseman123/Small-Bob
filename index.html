<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industry of the Occult</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; font-family: 'Courier New', Courier, monospace; color: #fff; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            pointer-events: none; display: flex; flex-direction: column; gap: 20px;
        }

        .panel {
            background: rgba(15, 15, 20, 0.85);
            border: 1px solid #333; border-top: 3px solid #bc13fe;
            padding: 15px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto; backdrop-filter: blur(4px); min-width: 200px;
        }

        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 2px;}
        .stat { font-size: 1.1rem; margin-bottom: 5px; }
        .money-text { color: #ffd700; font-weight: bold; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        .essence-text { color: #00f2ff; font-weight: bold; text-shadow: 0 0 5px rgba(0, 242, 255, 0.5); }

        button.blueprint-btn {
            display: block; width: 100%; background: #1a1a24; color: #aaa;
            border: 1px solid #444; border-left: 3px solid #555;
            padding: 10px 15px; margin-bottom: 8px; text-align: left; cursor: pointer;
            transition: all 0.2s ease; font-family: inherit; font-size: 1rem;
        }

        button.blueprint-btn:hover { background: #252535; color: #fff; border-left-color: #bc13fe; }
        button.blueprint-btn.active {
            background: #2a1b38; border-color: #bc13fe; border-left: 5px solid #bc13fe; color: #fff;
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.2);
        }
        
        #notification {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 85, 0.9); padding: 10px 20px; border-radius: 4px; 
            font-weight: bold; letter-spacing: 1px; display: none; transition: opacity 0.3s; z-index: 20;
        }

        /* DRAFT UI STYLES */
        #draft-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }

        #draft-overlay h1 { color: #00f2ff; font-size: 3rem; text-shadow: 0 0 20px #00f2ff; margin-bottom: 40px; }

        .cards-container { display: flex; gap: 30px; }

        .draft-card {
            background: #111; border: 2px solid #444; border-radius: 8px;
            width: 250px; padding: 20px; text-align: center; cursor: pointer;
            transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center;
        }

        .draft-card:hover { transform: translateY(-10px); border-color: #bc13fe; box-shadow: 0 10px 30px rgba(188, 19, 254, 0.4); }
        .draft-card .type { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; letter-spacing: 1px; }
        .draft-card h3 { color: #fff; margin: 0 0 15px 0; font-size: 1.4rem; }
        .draft-card p { color: #ccc; font-size: 0.95rem; line-height: 1.4; flex-grow: 1; }
        .draft-card .cost { margin-top: 15px; color: #ffd700; font-weight: bold; }

    </style>
</head>
<body>

    <div id="ui">
        <div class="panel" id="stats">
            <h2>Wave <span id="wave">1</span></h2>
            <div class="stat">BANK: <span class="money-text">$<span id="money">500</span></span></div>
            <div class="stat">ESSENCE: <span class="essence-text"><span id="essence">0</span>/<span id="quota">50</span></span></div>
        </div>

        <div class="panel" id="menu">
            <h2>Blueprints</h2>
            <button id="btn-drill" class="blueprint-btn" onclick="setTool('drill')">⛏️ DRILL ($50)</button>
            <button id="btn-purifier" class="blueprint-btn" onclick="setTool('purifier')">🔮 PURIFIER ($150)</button>
        </div>
    </div>

    <div id="draft-overlay">
        <h1>TITHE MET. CHOOSE YOUR REWARD.</h1>
        <div class="cards-container" id="draft-cards">
            </div>
    </div>

    <div id="notification">CAN ONLY PLACE ON LEYLINES!</div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 35; 

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- GAME STATE ---
        let runStats = {
            wispSpeed: 3.5,
            wispAgility: 0.08, 
            wispCapacity: 1,
            drillSpeed: 90 
        };

        let state = {
            money: 500,
            essence: 0,
            quota: 50,
            wave: 1,
            selectedTool: null,
            map: new Map(), 
            buildings: [],
            workers: [],
            paused: false
        };

        // All buildings in the game logic
        const CATALOG = {
            drill: { cost: 50, type: 'drill' },
            purifier: { cost: 150, type: 'purifier' },
            splitter: { cost: 300, type: 'splitter', name: '➗ SPLITTER' },
            accelerator: { cost: 200, type: 'accelerator', name: '⏩ ACCELERATOR' }
        };

        // Items that can appear in the draft
        const DRAFT_POOL = [
            { id: 'relic_drill', type: 'Relic', name: 'OVERCLOCKED GEARS', desc: 'Drills spawn Wisps 25% faster.' },
            { id: 'relic_agility', type: 'Relic', name: 'SLIPPERY SOULS', desc: 'Wisps curve around rocks 50% faster.' },
            { id: 'relic_speed', type: 'Relic', name: 'TAILWIND', desc: 'Base Wisp speed increased by 30%.' },
            { id: 'build_splitter', type: 'Blueprint', name: 'WISP SPLITTER', desc: 'A building that duplicates any Wisp that passes through it once.', cost: 300, blueprintId: 'splitter' },
            { id: 'build_accelerator', type: 'Blueprint', name: 'VOID ACCELERATOR', desc: 'A building that permanently doubles the speed of Wisps passing through it.', cost: 200, blueprintId: 'accelerator' }
        ];

        // Track what we've unlocked so we don't draft blueprints twice
        let unlockedDrafts = [];

        // --- MAP GENERATION ---
        function initMap() {
            const cols = Math.floor(canvas.width / TILE_SIZE);
            const rows = Math.floor(canvas.height / TILE_SIZE);

            for (let x = 0; x < cols; x++) {
                for (let y = 0; y < rows; y++) {
                    const r = Math.random();
                    let isLeyline = r < 0.10;
                    let isObstacle = !isLeyline && r < 0.25;

                    state.map.set(`${x},${y}`, { 
                        gridX: x, gridY: y, 
                        isLeyline: isLeyline, isObstacle: isObstacle, occupied: isObstacle 
                    });
                }
            }

            const centerX = Math.floor(cols / 2);
            const centerY = Math.floor(rows / 2);
            
            // Clear space for the Maw
            for(let dx = -1; dx <= 1; dx++) {
                for(let dy = -1; dy <= 1; dy++) {
                    let tile = state.map.get(`${centerX+dx},${centerY+dy}`);
                    if(tile) { tile.isObstacle = false; tile.isLeyline = false; tile.occupied = false; }
                }
            }

            state.map.get(`${centerX},${centerY}`).occupied = true;
            state.buildings.push({
                type: 'maw', x: centerX * TILE_SIZE, y: centerY * TILE_SIZE,
                cx: (centerX * TILE_SIZE) + (TILE_SIZE / 2), cy: (centerY * TILE_SIZE) + (TILE_SIZE / 2)
            });
        }

        // --- UI & CONTROLS ---
        window.setTool = (t) => {
            state.selectedTool = t;
            document.querySelectorAll('.blueprint-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`btn-${t}`)) document.getElementById(`btn-${t}`).classList.add('active');
        };

        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.innerText = msg; notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 2000);
        }

        // Update HTML stats
        function updateUIStats() {
            document.getElementById('money').innerText = state.money;
            document.getElementById('essence').innerText = state.essence;
            document.getElementById('quota').innerText = state.quota;
            document.getElementById('wave').innerText = state.wave;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (state.paused || !state.selectedTool) return;
            
            const gridX = Math.floor(e.clientX / TILE_SIZE);
            const gridY = Math.floor(e.clientY / TILE_SIZE);
            const tile = state.map.get(`${gridX},${gridY}`);

            if (!tile || tile.occupied) {
                if(tile && tile.isObstacle) showNotification("CANNOT BUILD ON VOID ROCKS!");
                return;
            }

            if (state.selectedTool === 'drill' && !tile.isLeyline) {
                showNotification("DRILLS MUST BE PLACED ON LEYLINES!"); return;
            }

            const cost = CATALOG[state.selectedTool].cost;
            if (state.money >= cost) {
                state.money -= cost;
                tile.occupied = true;
                
                state.buildings.push({
                    type: state.selectedTool, timer: 0,
                    x: gridX * TILE_SIZE, y: gridY * TILE_SIZE,
                    cx: (gridX * TILE_SIZE) + (TILE_SIZE / 2), cy: (gridY * TILE_SIZE) + (TILE_SIZE / 2)
                });
                updateUIStats();
            }
        });

        // --- DRAFTING LOGIC ---
        function triggerDraft() {
            state.paused = true;
            document.getElementById('draft-overlay').style.display = 'flex';
            
            // Filter out blueprints we already own
            let availablePool = DRAFT_POOL.filter(item => !unlockedDrafts.includes(item.id));
            
            // Shuffle and pick 3
            availablePool.sort(() => 0.5 - Math.random());
            let choices = availablePool.slice(0, 3);

            const container = document.getElementById('draft-cards');
            container.innerHTML = '';

            choices.forEach(choice => {
                const card = document.createElement('div');
                card.className = 'draft-card';
                card.innerHTML = `
                    <div class="type">${choice.type}</div>
                    <h3>${choice.name}</h3>
                    <p>${choice.desc}</p>
                    ${choice.cost ? `<div class="cost">Cost to build: $${choice.cost}</div>` : ''}
                `;
                card.onclick = () => selectDraft(choice);
                container.appendChild(card);
            });
        }

        function selectDraft(choice) {
            unlockedDrafts.push(choice.id);

            // Apply Effect
            if (choice.id === 'relic_drill') runStats.drillSpeed *= 0.75; // 25% faster
            if (choice.id === 'relic_agility') runStats.wispAgility *= 1.5;
            if (choice.id === 'relic_speed') runStats.wispSpeed *= 1.3;

            if (choice.type === 'Blueprint') {
                const btn = document.createElement('button');
                btn.id = `btn-${choice.blueprintId}`;
                btn.className = 'blueprint-btn';
                btn.innerText = `${CATALOG[choice.blueprintId].name} ($${choice.cost})`;
                btn.onclick = () => setTool(choice.blueprintId);
                document.getElementById('menu').appendChild(btn);
            }

            // Next Wave
            state.wave++;
            state.essence = 0;
            state.quota += 50; // Scaling difficulty
            updateUIStats();
            
            document.getElementById('draft-overlay').style.display = 'none';
            state.paused = false;
        }

        // --- ENGINE UPDATE ---
        function update() {
            if (state.paused) return;

            const targetMaw = state.buildings.find(b => b.type === 'maw');
            const interactables = state.buildings.filter(b => b.type === 'purifier' || b.type === 'splitter' || b.type === 'accelerator');

            // 1. Drills spawn Wisps
            state.buildings.forEach(b => {
                if (b.type === 'drill') {
                    b.timer++;
                    if (b.timer >= runStats.drillSpeed) {
                        b.timer = 0;
                        state.workers.push({
                            x: b.cx, y: b.cy,
                            vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                            trail: [], type: 'gold',
                            hasSplit: false, speedMult: 1 // Track wisp-specific buffs
                        });
                    }
                }
            });

            // 2. Wisp Movement
            let newWorkers = []; // For splitting

            for (let i = state.workers.length - 1; i >= 0; i--) {
                let w = state.workers[i];
                if (!targetMaw) continue;

                // Pathfinding logic
                let currentTarget = targetMaw;
                if (w.type === 'gold' && interactables.length > 0) {
                    let nearest = interactables[0];
                    let minDist = Math.hypot(nearest.cx - w.x, nearest.cy - w.y);
                    for(let j=1; j<interactables.length; j++) {
                        let d = Math.hypot(interactables[j].cx - w.x, interactables[j].cy - w.y);
                        if(d < minDist) { minDist = d; nearest = interactables[j]; }
                    }
                    currentTarget = nearest;
                }

                let dx = currentTarget.cx - w.x; let dy = currentTarget.cy - w.y; let dist = Math.hypot(dx, dy);

                // --- COLLISIONS ---
                if (dist < TILE_SIZE * 0.8) {
                    if (currentTarget.type === 'maw') {
                        if (w.type === 'gold') {
                            state.money += 15;
                        } else if (w.type === 'void') {
                            state.essence += runStats.wispCapacity;
                            if (state.essence >= state.quota) triggerDraft();
                        }
                        updateUIStats();
                        state.workers.splice(i, 1);
                        continue;
                    } 
                    else if (currentTarget.type === 'purifier') {
                        w.type = 'void';
                        w.vx *= 1.5; w.vy *= 1.5; // Exit bump
                    }
                    else if (currentTarget.type === 'splitter' && !w.hasSplit) {
                        w.hasSplit = true;
                        w.vx = -w.vy; w.vy = w.vx; // Deflect original
                        // Spawn clone
                        newWorkers.push({
                            ...w,
                            x: w.x, y: w.y,
                            vx: -w.vx, vy: -w.vy, // Go opposite way
                            trail: []
                        });
                    }
                    else if (currentTarget.type === 'accelerator' && w.speedMult < 2) {
                        w.speedMult = 2; // Hit the gas!
                    }
                }

                // --- STEERING ---
                let effectiveSpeed = runStats.wispSpeed * w.speedMult;
                let desiredVx = (dx / dist) * effectiveSpeed;
                let desiredVy = (dy / dist) * effectiveSpeed;

                // Obstacle avoidance
                let lookX = w.x + (desiredVx * 5); let lookY = w.y + (desiredVy * 5);
                let checkTile = state.map.get(`${Math.floor(lookX / TILE_SIZE)},${Math.floor(lookY / TILE_SIZE)}`);

                if (checkTile && checkTile.isObstacle) {
                    let temp = desiredVx; desiredVx = -desiredVy * 2; desiredVy = temp * 2;
                }

                w.vx += (desiredVx - w.vx) * runStats.wispAgility;
                w.vy += (desiredVy - w.vy) * runStats.wispAgility;
                w.x += w.vx; w.y += w.vy;

                w.trail.push({x: w.x, y: w.y});
                if (w.trail.length > 8) w.trail.shift();
            }

            // Add split wisps to the swarm
            state.workers.push(...newWorkers);
        }

        // --- RENDERING ---
        function drawMap() {
            ctx.fillStyle = '#333';
            state.map.forEach(tile => {
                ctx.beginPath(); ctx.arc(tile.gridX * TILE_SIZE + TILE_SIZE/2, tile.gridY * TILE_SIZE + TILE_SIZE/2, 1.5, 0, Math.PI*2); ctx.fill();

                if (tile.isLeyline) {
                    const pulse = 0.3 + Math.sin(Date.now() / 300) * 0.2;
                    ctx.fillStyle = `rgba(188, 19, 254, ${pulse})`; ctx.shadowBlur = 15; ctx.shadowColor = '#bc13fe';
                    const cx = tile.gridX * TILE_SIZE + TILE_SIZE/2; const cy = tile.gridY * TILE_SIZE + TILE_SIZE/2;
                    ctx.beginPath(); ctx.moveTo(cx, cy - 10); ctx.lineTo(cx + 10, cy); ctx.lineTo(cx, cy + 10); ctx.lineTo(cx - 10, cy); ctx.fill();
                    ctx.shadowBlur = 0; 
                }

                if (tile.isObstacle) {
                    ctx.fillStyle = '#111118'; ctx.strokeStyle = '#222233'; ctx.lineWidth = 2;
                    const rx = tile.gridX * TILE_SIZE; const ry = tile.gridY * TILE_SIZE;
                    ctx.beginPath(); ctx.moveTo(rx + 5, ry + TILE_SIZE - 5); ctx.lineTo(rx + TILE_SIZE/2, ry + 5); ctx.lineTo(rx + TILE_SIZE - 5, ry + TILE_SIZE - 5);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                }
            });
        }

        function drawBuildings() {
            state.buildings.forEach(b => {
                if (b.type === 'drill') {
                    const grad = ctx.createLinearGradient(b.x, b.y, b.x + TILE_SIZE, b.y + TILE_SIZE);
                    grad.addColorStop(0, '#00ccff'); grad.addColorStop(1, '#005588');
                    ctx.fillStyle = grad; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    ctx.fillRect(b.x + 5, b.y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                    ctx.strokeRect(b.x + 5, b.y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                } 
                else if (b.type === 'purifier') {
                    ctx.fillStyle = 'rgba(188, 19, 254, 0.2)'; ctx.strokeStyle = '#bc13fe'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(b.cx, b.cy, TILE_SIZE/2 - 2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(b.cx, b.cy - 10); ctx.lineTo(b.cx + 8, b.cy + 5); ctx.lineTo(b.cx - 8, b.cy + 5); ctx.fill();
                }
                else if (b.type === 'splitter') {
                    // Two glowing triangles facing apart
                    ctx.fillStyle = '#ffea00'; ctx.shadowBlur = 10; ctx.shadowColor = '#ffea00';
                    ctx.beginPath(); ctx.moveTo(b.cx - 2, b.cy); ctx.lineTo(b.cx - 12, b.cy - 8); ctx.lineTo(b.cx - 12, b.cy + 8); ctx.fill();
                    ctx.beginPath(); ctx.moveTo(b.cx + 2, b.cy); ctx.lineTo(b.cx + 12, b.cy - 8); ctx.lineTo(b.cx + 12, b.cy + 8); ctx.fill();
                    ctx.shadowBlur = 0;
                }
                else if (b.type === 'accelerator') {
                    // Chevron arrows
                    ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                    ctx.shadowBlur = 10; ctx.shadowColor = '#00ff41';
                    ctx.beginPath(); ctx.moveTo(b.cx - 5, b.cy - 10); ctx.lineTo(b.cx + 5, b.cy); ctx.lineTo(b.cx - 5, b.cy + 10); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(b.cx - 15, b.cy - 10); ctx.lineTo(b.cx - 5, b.cy); ctx.lineTo(b.cx - 15, b.cy + 10); ctx.stroke();
                    ctx.shadowBlur = 0;
                }
                else if (b.type === 'maw') {
                    const grad = ctx.createRadialGradient(b.cx, b.cy, 5, b.cx, b.cy, TILE_SIZE);
                    grad.addColorStop(0, '#ff0055'); grad.addColorStop(0.5, '#aa0000'); grad.addColorStop(1, '#220000');
                    ctx.fillStyle = grad; ctx.shadowBlur = 30 + Math.sin(Date.now() / 200) * 10; ctx.shadowColor = '#ff0000';
                    ctx.beginPath(); ctx.arc(b.cx, b.cy, TILE_SIZE * 0.8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.arc(b.cx, b.cy, TILE_SIZE * 0.3, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function drawWorkers() {
            state.workers.forEach(w => {
                const isGold = w.type === 'gold';
                const color = isGold ? '#ffd700' : '#00f2ff';
                const shadowColor = isGold ? 'rgba(255, 215, 0, 0.4)' : 'rgba(0, 242, 255, 0.4)';

                if (w.trail.length > 1) {
                    ctx.beginPath(); ctx.moveTo(w.trail[0].x, w.trail[0].y);
                    for (let j = 1; j < w.trail.length; j++) ctx.lineTo(w.trail[j].x, w.trail[j].y);
                    ctx.strokeStyle = shadowColor; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
                }

                ctx.fillStyle = color; ctx.shadowBlur = 10; ctx.shadowColor = color;
                ctx.beginPath(); ctx.arc(w.x, w.y, w.speedMult > 1 ? 4 : 3, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            });
        }

        function draw() {
            update();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMap();
            drawBuildings();
            drawWorkers();
            requestAnimationFrame(draw);
        }

        initMap();
        draw();
    </script>
</body>
</html>
